name: markethawk

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: stockscanner-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockscanner}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - stockscanner-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G

  # Redis for caching and Celery broker
  redis:
    image: redis:7-alpine
    container_name: stockscanner-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stockscanner-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  # IB Gateway — headless Interactive Brokers connection
  # Logs in automatically using IBC; exposes the TWS socket API on port 4002 (paper).
  # First-time startup takes ~45–60 s while IBC authenticates with IBKR servers.
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: stockscanner-ibgateway
    restart: always
    environment:
      TWS_USERID: ${IB_USERNAME}
      TWS_PASSWORD: ${IB_PASSWORD}
      TRADING_MODE: ${IB_TRADING_MODE:-paper}
      TWS_SETTINGS_PATH: /home/ibgateway/Jts
      GATEWAY_OR_TWS: gateway
      RELOGIN_AFTER_2AM: "yes"
      AUTO_RESTART_TIME: "11:59 PM"
      TWOFA_TIMEOUT_ACTION: restart
      READ_ONLY_API: ${IB_READ_ONLY:-yes}   # safety: no order submission via API
    ports:
      - "4004:4004"   # paper trading (socat proxy → localhost:4002) — use this for API clients
      - "4003:4003"   # live trading  (socat proxy → localhost:4001) — unused until needed
    volumes:
      - ib_gateway_settings:/home/ibgateway/Jts
    networks:
      - stockscanner-network
    healthcheck:
      # Port 4004 is the socat proxy — tests the full path that API clients use
      test: ["CMD", "bash", "-c", "socat /dev/null TCP:localhost:4004,connect-timeout=3"]
      interval: 10s
      timeout: 5s
      retries: 18          # allow up to 3 min for initial login
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G

  # Backend API
  backend:
    image: ghcr.io/omniscient/markethawk-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockscanner-api
    # Bind-mount (./backend:/app:ro) and --reload are restored in docker-compose.override.yml for local dev.
    command: sh -c "rm -rf /tmp/prometheus_multiproc/* 2>/dev/null; uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SEQ_URL: http://seq:5341
      WATCHFILES_FORCE_POLLING: "true"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      IBKR_HOST: ib-gateway
      IBKR_PORT: 4004
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-10}
      PYTHONDONTWRITEBYTECODE: "1"
      # Alerting & Push Notifications
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_CLAIMS_EMAIL: ${VAPID_CLAIMS_EMAIL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: markethawk-backend
      # JWT auth secret — required by Settings validator (>=32 chars), sourced from .env
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_started
    volumes:
      - prometheus_multiproc:/tmp/prometheus_multiproc
    networks:
      - stockscanner-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # Frontend
  frontend:
    image: ghcr.io/omniscient/markethawk-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockscanner-frontend
    # Bind-mounts (./frontend:/app, /app/node_modules) and npm run dev are restored in docker-compose.override.yml for local dev.
    command: npx vite preview --host --port 3333
    ports:
      - "3333:3333"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      VITE_API_TARGET: http://backend:8000
    networks:
      - stockscanner-network
    restart: unless-stopped

  # Celery for background tasks
  celery-worker:
    image: ghcr.io/omniscient/markethawk-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockscanner-celery
    # Bind-mount (./backend:/app:ro) and watchfiles hot-reload are restored in docker-compose.override.yml for local dev.
    command: sh -c "rm -rf /tmp/prometheus_multiproc/* 2>/dev/null; celery -A app.core.celery_app:celery_app worker --loglevel=info"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SEQ_URL: http://seq:5341
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WATCHFILES_FORCE_POLLING: "true"
      IBKR_HOST: ib-gateway
      IBKR_PORT: 4004
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-10}
      PYTHONDONTWRITEBYTECODE: "1"
      # Alerting & Push Notifications
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_CLAIMS_EMAIL: ${VAPID_CLAIMS_EMAIL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: markethawk-worker
      # JWT auth secret — required by Settings validator (>=32 chars), sourced from .env
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_started
    volumes:
      - prometheus_multiproc:/tmp/prometheus_multiproc
    networks:
      - stockscanner-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  # Live Scanner — streams real-time IBKR bars for watchlist symbols
  live-scanner:
    image: ghcr.io/omniscient/markethawk-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockscanner-live
    command: python -m live_scanner.main
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SEQ_URL: http://seq:5341
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      IBKR_HOST: ib-gateway
      IBKR_PORT: 4004
      IBKR_CLIENT_ID: 5   # dedicated clientId — never shares with backend or Celery
      PYTHONDONTWRITEBYTECODE: "1"
      # JWT auth secret — required by Settings validator (>=32 chars), sourced from .env
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_started
    # Bind-mount (./backend:/app:ro) is restored in docker-compose.override.yml for local dev.
    volumes: []
    networks:
      - stockscanner-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # Celery Beat for reliable scheduling
  celery-beat:
    image: ghcr.io/omniscient/markethawk-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockscanner-beat
    command: celery -A app.core.celery_app:celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SEQ_URL: http://seq:5341
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONDONTWRITEBYTECODE: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: markethawk-beat
      # JWT auth secret — required by Settings validator (>=32 chars), sourced from .env
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Bind-mount (./backend:/app:ro) is restored in docker-compose.override.yml for local dev.
    volumes: []
    networks:
      - stockscanner-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # Flower for Celery monitoring
  flower:
    image: ghcr.io/omniscient/markethawk-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockscanner-flower
    command: celery -A app.core.celery_app:celery_app flower --port=5555
    environment:
      # flower imports app.core.celery_app, which instantiates Settings() at import
      # time; DATABASE_URL, POLYGON_API_KEY and JWT_SECRET_KEY are now required
      # (and validated) fields, so flower needs them too (mirrors celery-worker)
      # or it crashes on startup.
      DATABASE_URL: ${DATABASE_URL}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH}
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    networks:
      - stockscanner-network
    deploy:
      resources:
        limits:
          memory: 256M

  # pgAdmin for PostgreSQL management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stockscanner-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stockscanner-network
    deploy:
      resources:
        limits:
          memory: 512M

  # Seq for centralized structured error logging
  seq:
    image: datalust/seq:latest
    container_name: stockscanner-seq
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_ADMINPASSWORDHASH: ${SEQ_ADMIN_PASSWORD_HASH}
    ports:
      - "127.0.0.1:5380:80"        # UI Port (Web Interface)
      - "127.0.0.1:5341:5341"      # Ingestion Port (API)
    volumes:
      - seq_data:/data
    networks:
      - stockscanner-network
    deploy:
      resources:
        limits:
          memory: 1G

  # GELF input sidecar — receives GELF from Docker log driver and forwards to Seq
  seq-gelf:
    image: datalust/seq-input-gelf:latest
    container_name: stockscanner-seq-gelf
    environment:
      SEQ_ADDRESS: "http://seq:5341"
    ports:
      - "127.0.0.1:12201:12201/udp"
    depends_on:
      - seq
    networks:
      - stockscanner-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # Prometheus — metrics scraper
  prometheus:
    build:
      context: ./monitoring/prometheus
      dockerfile: Dockerfile
    container_name: stockscanner-prometheus
    volumes:
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    networks:
      - stockscanner-network
    restart: unless-stopped

  # Grafana — metrics visualization
  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: stockscanner-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - stockscanner-network
    restart: unless-stopped

  # Docker Socket Proxy — restricts Docker API access for dark-factory and backlog-scheduler
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: markethawk-docker-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      BUILD: 1
      POST: 1
      SERVICES: 0
      EXEC: 0
      AUTH: 0
      SECRETS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - factory-network

  # Dark Factory — autonomous development agent (run on demand)
  dark-factory:
    image: ghcr.io/omniscient/markethawk-dark-factory:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: dark-factory/Dockerfile
    container_name: markethawk-dark-factory
    env_file:
      - path: .archon/.env
        required: true
    environment:
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    depends_on:
      - docker-socket-proxy
    networks:
      - factory-network
      - stockscanner-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://host.docker.internal:12201"
        tag: "dark-factory"
    profiles:
      - factory

  # Backlog Scheduler — polls GitHub board and dispatches dark factory runs
  backlog-scheduler:
    image: ghcr.io/omniscient/markethawk-dark-factory:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: dark-factory/Dockerfile
    container_name: backlog-scheduler
    restart: unless-stopped
    entrypoint: ["/opt/dark-factory/scheduler.sh"]
    env_file:
      - path: .archon/.env
        required: true
    environment:
      FACTORY_IMAGE: "ghcr.io/omniscient/markethawk-dark-factory:${IMAGE_TAG:-latest}"
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    depends_on:
      - docker-socket-proxy
    # Bind-mount (.:/workspace/project:ro) is restored in docker-compose.override.yml for local dev.
    volumes:
      - scheduler_state:/var/lib/dark-factory
    networks:
      - factory-network
      - stockscanner-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://host.docker.internal:12201"
        tag: "backlog-scheduler"
    profiles:
      - scheduler

  # TimesFM forecast worker — dedicated Celery worker for the 'forecasting' queue.
  # The 200M-parameter model requires ~32GB RAM; limit is set to 36GB for headroom.
  # Model weights (~800MB) are downloaded once from Hugging Face and cached in a volume.
  forecast-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.forecast
    container_name: stockscanner-forecast-worker
    command: celery -A app.core.celery_app:celery_app worker -Q forecasting --concurrency=1 --loglevel=info
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 36G
    volumes:
      - timesfm_cache:/root/.cache/huggingface
    networks:
      - stockscanner-network
    profiles:
      - forecasting

  tweet-monitor:
    build:
      context: ./services/tweet-monitor
      dockerfile: Dockerfile
    container_name: markethawk-tweet-monitor
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      SEQ_URL: http://seq:5341
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PROMOTION_THRESHOLD: ${PROMOTION_THRESHOLD:-0.7}
      BROWSER_MAX_AGE_MINUTES: ${BROWSER_MAX_AGE_MINUTES:-30}
      BROWSER_MAX_MEMORY_MB: ${BROWSER_MAX_MEMORY_MB:-512}
      POLL_TIMEOUT_SECONDS: ${POLL_TIMEOUT_SECONDS:-25}
      X_AUTH_TOKEN: ${X_AUTH_TOKEN:-}
      X_CSRF_TOKEN: ${X_CSRF_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stockscanner-network
    deploy:
      resources:
        limits:
          memory: 1G

  # Distributed Tracing — Jaeger all-in-one
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: markethawk-jaeger
    restart: unless-stopped
    ports:
      - "127.0.0.1:16686:16686"   # Jaeger UI
      - "4317:4317"                # OTLP gRPC receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - stockscanner-network

volumes:
  postgres_data:
    external: true
    name: markethawk_postgres_data
  redis_data:
    external: true
    name: markethawk_redis_data
  pgadmin_data:
    external: true
    name: markethawk_pgadmin_data
  seq_data:
    external: true
    name: markethawk_seq_data
  ib_gateway_settings:
    external: true
    name: markethawk_ib_gateway_settings
  scheduler_state:
  timesfm_cache:
  # Regular named volume (not tmpfs) so all containers (backend + celery-worker)
  # share the same directory. prometheus-client MultiProcessCollector reads every
  # PID-named .db file from this volume; with tmpfs each container had its own
  # private mount so worker metrics were invisible to the backend's /metrics endpoint.
  prometheus_multiproc:
  prometheus_data:
  grafana_data:


networks:
  stockscanner-network:
    driver: bridge
  factory-network:
    driver: bridge
