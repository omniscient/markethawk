version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: stockscanner-db
    environment:
      POSTGRES_DB: stockscanner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: stockscanner123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - stockscanner-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockscanner-api
    environment:
      DATABASE_URL: postgresql://postgres:stockscanner123@postgres:5432/stockscanner
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SEQ_URL: http://seq:5341
      WATCHFILES_FORCE_POLLING: "true"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      IBKR_HOST: ${IBKR_HOST:-host.docker.internal}
      IBKR_PORT: ${IBKR_PORT:-7496}
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-10}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    networks:
      - stockscanner-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockscanner-frontend
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      VITE_API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - stockscanner-network
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: stockscanner-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stockscanner-network

  # Celery for background tasks
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockscanner-celery
    command: python -m watchfiles --filter python 'celery -A app.main.celery worker --loglevel=info' /app/app
    environment:
      DATABASE_URL: postgresql://postgres:stockscanner123@postgres:5432/stockscanner
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SEQ_URL: http://seq:5341
      WATCHFILES_FORCE_POLLING: "true"
      IBKR_HOST: ${IBKR_HOST:-host.docker.internal}
      IBKR_PORT: ${IBKR_PORT:-7496}
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-10}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    networks:
      - stockscanner-network

  # Celery Beat for reliable scheduling
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockscanner-beat
    command: celery -A app.main.celery beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:stockscanner123@postgres:5432/stockscanner
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SEQ_URL: http://seq:5341
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    networks:
      - stockscanner-network

  # Flower for Celery monitoring
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockscanner-flower
    command: celery -A app.main.celery flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery-worker
    networks:
      - stockscanner-network

  # pgAdmin for PostgreSQL management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stockscanner-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stockscanner.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - stockscanner-network

  # Seq for centralized structured error logging
  seq:
    image: datalust/seq:latest
    container_name: stockscanner-seq
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5380:80"        # UI Port (Web Interface)
      - "5341:5341"      # Ingestion Port (API)
    volumes:
      - seq_data:/data
    networks:
      - stockscanner-network

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  seq_data:


networks:
  stockscanner-network:
    driver: bridge

