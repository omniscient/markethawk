global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: markethawk_backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: tweet_monitor
    static_configs:
      - targets: ["tweet-monitor:8000"]
    metrics_path: /metrics
