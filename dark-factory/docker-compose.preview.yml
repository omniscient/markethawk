# Preview environment for MarketHawk feature branches.
#
# Images are PRE-BAKED — the factory builds them via a remote BuildKit daemon over TCP
# (`docker buildx build --builder remote --load`, see #436) and passes the tags in as
# PREVIEW_BACKEND_IMAGE / PREVIEW_FRONTEND_IMAGE, then brings the stack up WITHOUT --build.
# This avoids the docker.sock connection-hijack the socket-proxy blocks. Invoked as:
#   PREVIEW_BACKEND_IMAGE=… PREVIEW_FRONTEND_IMAGE=… ISSUE_NUM_PADDED=03 \
#     docker compose -p mh-preview-3 -f dark-factory/docker-compose.preview.yml up -d
#
# DB schema is applied by the one-shot `migrate` service (alembic upgrade head); backend
# and celery-worker gate on its successful completion because the backend entrypoint runs
# `alembic check` (set -e) and crash-loops against an unmigrated DB.
#
# Port scheme: 1{ISSUE_NUM_PADDED}XX where XX is the service suffix.
# Example for issue #3:  frontend=10333, backend=10380, postgres=10354, redis=10363
# Example for issue #12: frontend=11233, backend=11280, postgres=11254, redis=11263

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: stockscanner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: preview_password
    ports:
      - "1${ISSUE_NUM_PADDED:-00}54:5432"
    volumes:
      - preview_postgres_data:/var/lib/postgresql/data
    networks:
      - preview-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "1${ISSUE_NUM_PADDED:-00}63:6379"
    networks:
      - preview-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # One-shot schema migration. Uses the pre-baked backend image but OVERRIDES its entrypoint
  # (/entrypoint.sh runs `alembic check` under set -e, which fails on an unmigrated DB) to run
  # the upgrade directly. The preview DB is ephemeral (down -v on teardown) so it is always
  # fresh: a single `alembic upgrade head` replaces the old create_all/stamp/upgrade dance.
  migrate:
    image: ${PREVIEW_BACKEND_IMAGE:-mh-preview-backend:latest}
    entrypoint: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql://postgres:preview_password@postgres:5432/stockscanner
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      # alembic env.py imports the app Settings, whose validator requires these fields.
      # Must mirror the backend service's env or `alembic upgrade head` aborts before migrating.
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      # Dev-only throwaway key (>=32 chars) — satisfies the JWT_SECRET_KEY startup validator (#190).
      JWT_SECRET_KEY: preview-only-not-secret-0123456789abcdef
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - preview-network
    restart: "no"

  backend:
    image: ${PREVIEW_BACKEND_IMAGE:-mh-preview-backend:latest}
    environment:
      DATABASE_URL: postgresql://postgres:preview_password@postgres:5432/stockscanner
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      # Dev-only throwaway key (>=32 chars) so the JWT_SECRET_KEY startup validator (#190)
      # is satisfied. NOT a real secret — preview stacks are ephemeral and network-isolated.
      JWT_SECRET_KEY: preview-only-not-secret-0123456789abcdef
    ports:
      - "1${ISSUE_NUM_PADDED:-00}80:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - preview-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: ${PREVIEW_FRONTEND_IMAGE:-mh-preview-frontend:latest}
    environment:
      VITE_API_TARGET: http://backend:8000
    ports:
      - "1${ISSUE_NUM_PADDED:-00}33:3333"
    networks:
      - preview-network
    restart: unless-stopped

  celery-worker:
    image: ${PREVIEW_BACKEND_IMAGE:-mh-preview-backend:latest}
    command: celery -A app.core.celery_app:celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:preview_password@postgres:5432/stockscanner
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      # Dev-only throwaway key (>=32 chars) — see backend service note above.
      JWT_SECRET_KEY: preview-only-not-secret-0123456789abcdef
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - preview-network
    restart: unless-stopped

  seed:
    image: postgres:15-alpine
    volumes:
      - ./seed:/seed:ro
    entrypoint: >
      sh -c "for f in /seed/*.sql; do
        echo \"Running $$f...\";
        PGPASSWORD=preview_password psql -h postgres -U postgres -d stockscanner -f \"$$f\";
      done && echo 'All seed modules loaded'"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - preview-network
    restart: "no"

volumes:
  preview_postgres_data:

networks:
  preview-network:
    driver: bridge
