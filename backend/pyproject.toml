[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=60"

[tool.coverage.run]
source = ["app"]
omit = [
    "app/main.py",
    "app/migrations/*",
    # Requires live IBKR connection — tested via manual QA and docker-status agent
    "app/services/futures_data.py",
]
# _poll_live_orders and sync_futures_aggregates carry # pragma: no cover

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "DTZ003", "DTZ004"]
ignore = [
    "E501",   # line-too-long: not auto-fixable; deferred to a follow-up cleanup issue
    "E711",   # comparison-to-none: SQLAlchemy uses == None to generate IS NULL in SQL
    "E712",   # comparison-to-true: SQLAlchemy uses == True/False to generate SQL predicates
]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]
# Tests import app modules after sys.path manipulation (E402); fixtures are redefined per-test
# (F811 is intentional pytest pattern); unused vars in tests are intermediate assertions (F841)
"**/tests/**/*.py" = ["E402", "F811", "F841"]
# Scripts use star imports for schema reflection and import after path setup
"**/scripts/**/*.py" = ["E402", "F403", "W291", "W293"]
