# MarketHawk Dark Factory adapter (.factory/adapter.yaml)
#
# Explicit mirror of the extracted factory's built-in defaults
# (dark-factory: scripts/factory_core/adapter_defaults.py). Every mirrored value
# EQUALS the default — behavior is bit-identical; the point is that MarketHawk
# no longer depends on those defaults surviving future factory releases.
# Deep-merged over defaults at dispatch; validated by MarketHawk CI (adapter-validate)
# and at factory dispatch (fail-closed with a ticket comment on invalid).
#
# token_optimization: declarative snapshot — .claude/skills/refinement/config.yaml is authoritative until P3 wiring. AT P3: re-sync this entire block against config.yaml current values BEFORE wiring/deleting — do not wire a stale snapshot (e.g. an old enforce flag would revert live enforcement).
schema_version: 1

components:
  backend:
    - "Scan Execution Flow"
    - "Backend Module Map"
    - "Error Tracking System"
    - "Celery Task Architecture"
    - "Test Architecture"
  frontend:
    - "Frontend Architecture"
    - "Backend Module Map"
    - "Error Tracking System"
  dark-factory:
    - "Service Topology"
    - "Celery Task Architecture"
    - "Metrics and Observability"
  infrastructure:
    - "Service Topology"
    - "IB Gateway Integration"
    - "Live Scanner"
    - "Celery Task Architecture"
    - "Catch Up Feature (Universe Aggregate Backfill)"
    - "Metrics and Observability"

safety:
  sensitive_keywords: "trading|ibkr|live order|notional|authentication|authorization|authn|authz|jwt|oauth|rbac|/auth"
  hard_exclude_paths:
    - "dark-factory/"
    - ".archon/"
    - "scheduler.sh"
    - "factory_core/"
    - "app/services/trading"
    - "app/tasks/trading.py"
    - "app/core/auth"
    - "app/routers/auth"
    - ".claude/skills/"
    - ".claude/settings.json"
    - ".claude/settings.local.json"
    - ".mcp.json"
    - ".claude/plugins/"
    - ".claude-plugin/"
    - ".factory/hooks/"
  dispatch_ceiling_keywords: "migration|migrate|performance|perf|architectur|refactor"
  critical_diff_paths:
    - "^alembic/versions/"
    - "^backend/app/routers/auth"
    - "^backend/app/core/auth"
    - "app/services/trading"
    - "app/tasks/trading\\.py"
    - "^dark-factory/"
    - "^\\.claude/skills/.*/scripts/"
    - "^\\.claude/skills/.*/SKILL\\.md$"
    - "^\\.claude/settings\\.json$"
    - "^\\.claude/settings\\.local\\.json$"
    - "^\\.mcp\\.json$"
    - "^\\.claude/plugins/"
    - "^\\.claude-plugin/"
    - "^\\.factory/hooks/"
  migration_seed_auth_patterns:
    - "^alembic/versions/"
    - "^dark-factory/seed/"
    - "seed.*\\.sql$"
    - "^backend/app/routers/auth\\.py$"
    - "^\\.claude/skills/.*/scripts/"
    - "^\\.claude/settings\\.json$"
    - "^\\.claude/settings\\.local\\.json$"
    - "^\\.mcp\\.json$"
    - "^\\.claude/plugins/"
    - "^\\.claude-plugin/"
    - "^\\.factory/hooks/"
  main_red_allowed_paths:
    - "backend/"
    - "frontend/"
    - "alembic/"
    - "dark-factory/smoke_gate.sh"

memory_routing:
  "backend/app/*": ".archon/memory/backend-patterns.md"
  "frontend/src/*": ".archon/memory/frontend-patterns.md"

deconflict:
  models_init: "backend/app/models/__init__.py"
  migrations_dir: "alembic/versions/"

token_optimization:
  enabled: true               # measure token usage per run; env: TOKEN_OPTIMIZATION_ENABLED overrides
  enforce_budgets: true       # true = enforce budgets for per-scenario enforce: true scenarios; NO env override — rollback is a git commit to main (see runbook)
  default_budget_tokens: 30000  # per-scenario budget when no override is set; env: TOKEN_OPTIMIZATION_DEFAULT_BUDGET_TOKENS overrides
  budgets:
    refine: 30000
    plan: 30000
    implement: 30000
    conformance: 22000         # provisional from T5 smoke run; recalibrate per runbook Follow-up Path (docs/agents/dark-factory-token-optimization.md)
    code-review: 22000         # provisional from T5 smoke run; recalibrate per runbook Follow-up Path (docs/agents/dark-factory-token-optimization.md)
  enforce:
    refine: true               # T3b: enforcement live — #733 via #731 scorecard: 0% section_at_risk
    plan: true                 # T3b: enforcement live — #733 via #731 scorecard: 0% section_at_risk
    implement: true            # T5 (#734): enforcement live — #730/#731 calibration, arch-cap raise → 0% section_at_risk at 30000
    conformance: true          # T6: enforcement live — 0% section_at_risk in T5 calibration
    code-review: true          # T6: enforcement live — 0% section_at_risk in T5 calibration
  issue_context:
    reserve_tokens: 2000      # minimum token reservation for issue_context (floor applied even when actual < reserve)
  architecture:
    enabled: true             # false = skip slicing, load full ARCHITECTURE.md; env: TOKEN_OPTIMIZATION_ARCHITECTURE_ENABLED overrides
    mode: slice               # slice = emit only the changed file excerpt + its direct callers
    max_tokens: 5000          # token ceiling for architecture context per scenario (baked — no env override)
    min_tokens: 2500          # floor for budget_enforce.py proportional distribution (50% of max_tokens)
  memory:
    enabled: true             # false = skip top-k cap, emit all matching entries; env: TOKEN_OPTIMIZATION_MEMORY_ENABLED overrides
    mode: top_k               # top_k = emit only the K highest-scored memory entries
    max_entries: 8            # max memory entries surfaced per phase (baked — no env override)
    max_tokens: 1500          # token ceiling for memory context per phase (baked — no env override)
    min_tokens: 750           # floor for budget_enforce.py proportional distribution (50% of max_tokens)
  comments:
    enabled: true             # false = skip comment digesting, use raw comments; env: TOKEN_OPTIMIZATION_COMMENTS_ENABLED overrides
    digest_after_factory_marker: true  # collapse comment blocks below the factory marker into a one-line digest
    max_tokens: 2000          # token ceiling for comment context per scenario (baked — no env override)
    min_tokens: 1000          # floor for budget_enforce.py proportional distribution (50% of max_tokens)
  diff:
    enabled: true             # false = skip diff ranking/truncation, emit full diff; env: TOKEN_OPTIMIZATION_DIFF_ENABLED overrides
    max_review_tokens: 6000   # token ceiling for diff context fed to the code-review sub-stage (baked — no env override)
    min_review_tokens: 3000   # floor for budget_enforce.py proportional distribution (50% of max_review_tokens)
  escalation:
    cheap_model_first: true   # route to haiku/sonnet before opus for non-sensitive scenarios; env: TOKEN_OPTIMIZATION_CHEAP_MODEL_FIRST overrides
    opus_only_for:            # scenario tags matched by factory command files (dark-factory-implement.md, etc.); always escalate to opus regardless of cheap_model_first
      - security
      - trading
      - auth
      - high_blast_radius
      - material_conformance_uncertainty
