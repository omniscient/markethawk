name: archon-dark-factory
description: |
  Use when: Running inside the dark-factory Docker container to implement a GitHub issue.
  Triggers: "Fix issue", "Continue issue", "Close issue", "Refine issue", "Plan issue".
  Does: Parses intent -> fetches issue context -> branches -> implements/refines/plans ->
        spins up preview stack (implement only) -> validates -> pushes and creates PR/spec/plan.
  NOT for: Running outside the dark-factory container.

provider: claude
model: sonnet

worktree:
  enabled: false

nodes:
  # Layer 0: Parse the command and fetch issue context
  - id: parse-intent
    prompt: |
      Parse this command and extract two things:
      1. The GitHub issue number
      2. The intent: "new" (first time working on this issue), "continue" (iterate on existing work), "close" (merge and tear down), "refine" (generate a design spec), "plan" (generate an implementation plan), or "resolve" (merge main into an existing branch and resolve conflicts)

      Command: $ARGUMENTS

      Output ONLY valid JSON, nothing else:
      {"issue_number": <int>, "intent": "<new|continue|close|refine|plan|resolve>"}
    allowed_tools: []
    model: haiku
    output_format:
      type: object
      properties:
        issue_number:
          type: integer
        intent:
          type: string
          enum: [new, continue, close, refine, plan, resolve]
      required: [issue_number, intent]

  - id: fetch-issue
    bash: |
      N=$parse-intent.output.issue_number
      INTENT=$parse-intent.output.intent
      EPIC_N=""
      ISSUE_DATA=$(gh issue view "$N" --json title,body,labels,comments)

      # --- Epic resolution: never implement an epic monolithically ---
      IS_EPIC=$(echo "$ISSUE_DATA" | jq -r 'if [.labels[].name] | index("epic") then "yes" else "no" end')

      if [ "$IS_EPIC" = "yes" ]; then
        echo "Issue #$N is an epic — resolving to next sub-issue..." >&2
        BODY=$(echo "$ISSUE_DATA" | jq -r '.body // ""')
        SUB_ISSUES=$(echo "$BODY" | grep -oP '\- \[ \] #\K\d+' || true)

        if [ -z "$SUB_ISSUES" ]; then
          echo "ERROR: Epic #$N has no unchecked sub-issues (expected '- [ ] #NN' entries)" >&2
          exit 1
        fi

        RESOLVED=""
        for SUB in $SUB_ISSUES; do
          STATE=$(gh issue view "$SUB" --json state --jq '.state')
          if [ "$STATE" != "OPEN" ]; then
            echo "  #$SUB — closed, skipping" >&2
            continue
          fi
          HAS_PR=$(gh pr list --search "head:feat/issue-${SUB}-" --json number --jq '.[0].number // empty')
          if ([ "$INTENT" = "continue" ] || [ "$INTENT" = "close" ]) && [ -n "$HAS_PR" ]; then
            echo "  #$SUB — has open PR, picking for $INTENT" >&2
            RESOLVED="$SUB"
            break
          elif [ "$INTENT" != "continue" ] && [ "$INTENT" != "close" ] && [ -z "$HAS_PR" ]; then
            echo "  #$SUB — open and no PR, starting this one" >&2
            RESOLVED="$SUB"
            break
          else
            echo "  #$SUB — skipping (intent=$INTENT, has_pr=${HAS_PR:-none})" >&2
          fi
        done

        # Fallback for continue/close: if no sub-issue has a PR, pick first open one
        if [ -z "$RESOLVED" ] && ([ "$INTENT" = "continue" ] || [ "$INTENT" = "close" ]); then
          for SUB in $SUB_ISSUES; do
            STATE=$(gh issue view "$SUB" --json state --jq '.state')
            if [ "$STATE" = "OPEN" ]; then
              echo "  Fallback: picking first open sub-issue #$SUB" >&2
              RESOLVED="$SUB"
              break
            fi
          done
        fi

        if [ -z "$RESOLVED" ]; then
          echo "ERROR: All sub-issues in epic #$N are closed or already have PRs" >&2
          exit 1
        fi

        echo "Resolved epic #$N → sub-issue #$RESOLVED" >&2
        EPIC_N="$N"
        N="$RESOLVED"
        ISSUE_DATA=$(gh issue view "$N" --json title,body,labels,comments)
      fi

      # --- Fetch PR review comments if a PR exists for this issue ---
      PR_NUM=$(gh pr list --search "head:feat/issue-${N}-" --json number --jq '.[0].number // empty')
      if [ -n "$PR_NUM" ]; then
        PR_COMMENTS=$(gh pr view "$PR_NUM" --json reviews,comments,reviewRequests)
        INLINE_COMMENTS=$(gh api "repos/omniscient/markethawk/pulls/$PR_NUM/comments" \
          --jq '[.[] | {path: .path, line: .line, body: .body, created_at: .created_at}]' 2>/dev/null || echo '[]')
        ISSUE_DATA=$(echo "$ISSUE_DATA" \
          | jq --argjson pr "$PR_COMMENTS" --argjson inline "$INLINE_COMMENTS" \
            '. + {pr_reviews: $pr, pr_inline_comments: $inline}')
      fi
      FINAL_JSON=$(echo "$ISSUE_DATA" | jq \
        --arg intent "$INTENT" \
        --argjson resolved "$N" \
        --arg epic "${EPIC_N:-null}" \
        '. + {intent: $intent, resolved_number: $resolved, epic_number: (if $epic == "null" then null else ($epic | tonumber) end)}')
      # Persist to artifacts so downstream bash nodes read the file instead of inlining
      # the fetch-issue node output into their scripts. (NEVER write the dollar-ref form in
      # comments — Archon substitutes it textually, even inside comments.) Inlined output
      # counts against the kernel's 128KiB-per-argv limit; a comment-heavy issue → E2BIG.
      mkdir -p "$ARTIFACTS_DIR"
      printf '%s' "$FINAL_JSON" > "$ARTIFACTS_DIR/issue.json"
      echo "$FINAL_JSON"
    depends_on: [parse-intent]
    timeout: 60000

  # Layer 0.5: Acknowledge feedback (continue flow only)
  - id: summarize-feedback
    prompt: |
      You are reviewing feedback on a code implementation. Below is the issue and PR data.
      Focus only on human-authored feedback — ignore any comments from "Dark Factory" or other bots.
      Summarize the feedback in 2-3 sentences covering what changes the reviewer wants made.
      If there is no meaningful human feedback, respond with: {"summary": "No specific feedback found."}

      Issue and PR data:
      $fetch-issue.output

      Output ONLY valid JSON, nothing else:
      {"summary": "<2-3 sentence summary>"}
    allowed_tools: []
    model: haiku
    depends_on: [fetch-issue]
    when: "$parse-intent.output.intent == 'continue'"
    output_format:
      type: object
      properties:
        summary:
          type: string
      required: [summary]

  - id: acknowledge-continue
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      SUMMARY="$summarize-feedback.output.summary"
      echo "Acknowledging feedback for issue #${ISSUE}..."
      gh issue comment "$ISSUE" --body "Resuming work — Feedback understood: ${SUMMARY}"
      echo "Acknowledged feedback for issue #${ISSUE}"
    depends_on: [summarize-feedback]
    when: "$parse-intent.output.intent == 'continue'"
    timeout: 15000

  # Layer 1: Route based on intent
  - id: close-announce
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      echo "Closing issue #${ISSUE}: merging PR and tearing down preview..."
      gh issue comment "$ISSUE" --body "Merging PR and tearing down preview environment."
      echo "Announced close for issue #${ISSUE}"
    depends_on: [fetch-issue]
    when: "$parse-intent.output.intent == 'close'"
    timeout: 15000

  - id: close-preview
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      EPIC_NUM=$(jq -r '.epic_number // empty' "$ARTIFACTS_DIR/issue.json")

      echo "Tearing down mh-preview-${ISSUE}..."
      docker compose -p "mh-preview-${ISSUE}" down -v 2>/dev/null || echo "No preview stack found"

      # Assert no containers survive teardown
      STALE=$(docker ps -a --filter "label=com.docker.compose.project=mh-preview-${ISSUE}" --format '{{.Names}}' 2>/dev/null || true)
      if [ -n "$STALE" ]; then
        echo "ERROR: Stale preview containers remain after teardown:" >&2
        echo "$STALE" >&2
        exit 1
      fi
      echo "close-preview: teardown verified — no mh-preview-${ISSUE} containers remain"

      # Find the PR (branch includes a slug suffix, so use search prefix match)
      PR_NUM=$(gh pr list --search "head:feat/issue-${ISSUE}-" --json number --jq '.[0].number // empty')
      if [ -z "$PR_NUM" ]; then
        echo "ERROR: No PR found for issue #$ISSUE"
        exit 1
      fi

      # Refuse auto-merge if a blast-radius block (or any other gate block) is still active
      HAS_NEEDS_DISCUSSION=$(gh issue view "$ISSUE" \
        --repo omniscient/markethawk \
        --json labels --jq '.labels[].name' \
        | grep -c 'needs-discussion' || true)
      if [ "$HAS_NEEDS_DISCUSSION" -gt 0 ]; then
        echo "close-preview: BLOCKED — needs-discussion label present on issue #$ISSUE"
        echo "Remove the label after human review, then re-run:"
        echo "  docker compose --profile factory run --rm dark-factory \"Close issue #$ISSUE\""
        exit 1
      fi

      # Mark ready (factory creates PRs as drafts) then merge to main
      gh pr ready "$PR_NUM" 2>/dev/null || true
      if ! gh pr merge "$PR_NUM" --merge --delete-branch; then
        echo "ERROR: PR #$PR_NUM could not be merged (check approval status or conflicts)"
        exit 1
      fi
      echo "PR #$PR_NUM merged successfully"

      # Move the sub-issue to Done (never the epic — it stays In Progress)
      ITEM_ID=$(gh project item-list 1 --owner omniscient --format json --limit 200 \
        | jq -r ".items[] | select(.content.number == $ISSUE and .content.type == \"Issue\") | .id")
      if [ -n "$ITEM_ID" ]; then
        gh project item-edit \
          --project-id PVT_kwHOAAFds84BWh4w \
          --id "$ITEM_ID" \
          --field-id PVTSSF_lAHOAAFds84BWh4wzhR1VaA \
          --single-select-option-id 98236657
        echo "Moved issue #$ISSUE to Done"
      fi
      gh issue comment "$ISSUE" --body "Dark factory: preview torn down, PR #${PR_NUM} merged. Issue complete."
      echo "CLOSED"
    depends_on: [parse-intent, fetch-issue]
    when: "$parse-intent.output.intent == 'close'"
    timeout: 30000

  - id: post-merge-update-codeindex
    bash: |
      if ! command -v codeindex &>/dev/null; then
        echo "WARNING: codeindex not available — skipping post-merge hotspot update"
        exit 0
      fi
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      echo "Refreshing codeindex hotspots on main (post-merge for issue #${ISSUE})..."
      git fetch origin main
      git checkout main
      git reset --hard origin/main
      codeindex analyze . 2>/dev/null || echo "WARNING: codeindex analyze failed"
      codeindex symbols . --output symbolindex.json 2>/dev/null || echo "WARNING: codeindex symbols failed"
      mkdir -p docs
      codeindex high-blast 2>/dev/null > docs/codeindex-hotspots.md.tmp \
        && mv docs/codeindex-hotspots.md.tmp docs/codeindex-hotspots.md \
        || echo "WARNING: codeindex high-blast failed — hotspots file unchanged"
      git add docs/codeindex-hotspots.md
      if ! git diff --staged --quiet; then
        git commit -m "chore: refresh codeindex hotspots (post-merge #${ISSUE})"
        git push origin main \
          || echo "WARNING: push to main failed — hotspots will be stale until next manual refresh"
      else
        echo "codeindex hotspots unchanged post-merge — no commit needed"
      fi
    depends_on: [close-preview]
    when: "$parse-intent.output.intent == 'close'"
    timeout: 120000

  - id: setup-branch
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      INTENT=$parse-intent.output.intent
      SLUG=$(jq -r '.title // "feature"' "$ARTIFACTS_DIR/issue.json" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | head -c 40)
      BRANCH="feat/issue-${ISSUE}-${SLUG}"
      echo "Setting up branch for issue #${ISSUE}..."

      if [ "$INTENT" = "continue" ]; then
        git fetch origin "$BRANCH" 2>/dev/null && git checkout "$BRANCH" || git checkout -b "$BRANCH"
      else
        git checkout -b "$BRANCH"
      fi
      echo "$BRANCH"
    depends_on: [parse-intent, fetch-issue]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 15000

  # Refinement branch setup (refine/issue-N-slug)
  - id: setup-refine-branch
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      SLUG=$(jq -r '.title // "feature"' "$ARTIFACTS_DIR/issue.json" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | head -c 40)
      BRANCH="refine/issue-${ISSUE}-${SLUG}"

      EXISTING=$(git branch -r --list "origin/$BRANCH" 2>/dev/null)
      if [ -n "$EXISTING" ]; then
        git fetch origin "$BRANCH" && git checkout "$BRANCH"
      else
        git checkout -b "$BRANCH"
      fi
      echo "$BRANCH"
    depends_on: [parse-intent, fetch-issue]
    when: "$parse-intent.output.intent == 'refine' || $parse-intent.output.intent == 'plan'"
    timeout: 15000

  # Resolve branch setup — checkout the existing feat/issue-N-slug branch (no new branch)
  - id: setup-branch-resolve
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      SLUG=$(jq -r '.title // "feature"' "$ARTIFACTS_DIR/issue.json" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | head -c 40)
      BRANCH="feat/issue-${ISSUE}-${SLUG}"

      echo "Checking out existing branch ${BRANCH} for conflict resolution..."
      if ! git fetch origin "$BRANCH" 2>/dev/null; then
        echo "ERROR: branch $BRANCH not found on origin — nothing to resolve"
        exit 1
      fi
      git checkout "$BRANCH"
      echo "$BRANCH"
    depends_on: [parse-intent, fetch-issue]
    when: "$parse-intent.output.intent == 'resolve'"
    timeout: 15000

  # Context budget telemetry — captures pre-prompt token estimate for refine phase
  - id: budget-refine
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      # $CLONE_DIR and $RUN_ID are NOT exported to bash nodes (see de-conflict node comment).
      # Fall back to "." for CLONE_DIR (CWD is the clone root in bash nodes) and derive
      # RUN_ID from the ARTIFACTS_DIR basename (e.g. .../runs/<run-id>).
      _CLONE="${CLONE_DIR:-.}"
      _RUN="${RUN_ID:-$(basename "${ARTIFACTS_DIR:-/tmp/budget}")}"
      python3 "$_CLONE/dark-factory/scripts/context_budget.py" \
        --scenario refine \
        --issue-num "$ISSUE" \
        --run-id "$_RUN" \
        --artifacts-dir "$ARTIFACTS_DIR" \
        --clone-dir "$_CLONE" \
        --issue-json "$ARTIFACTS_DIR/issue.json" \
        --memory-file "$ARTIFACTS_DIR/memory-context.md" \
        --out "$ARTIFACTS_DIR/context-budget.json" || true
    depends_on: [setup-refine-branch, fetch-issue]
    when: "$parse-intent.output.intent == 'refine'"
    timeout: 30000

  # Layer 2a: Refine — generate spec via multi-agent brainstorming
  - id: refine
    command: dark-factory-refine
    depends_on: [budget-refine, setup-refine-branch, fetch-issue]
    when: "$parse-intent.output.intent == 'refine'"
    idle_timeout: 600000

  # Context budget telemetry — captures pre-prompt token estimate for plan phase
  - id: budget-plan
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      _CLONE="${CLONE_DIR:-.}"
      _RUN="${RUN_ID:-$(basename "${ARTIFACTS_DIR:-/tmp/budget}")}"
      SPEC_FILE=$(grep -rl "#${ISSUE}" "$_CLONE/docs/superpowers/specs/" 2>/dev/null | head -1 || true)
      python3 "$_CLONE/dark-factory/scripts/context_budget.py" \
        --scenario plan \
        --issue-num "$ISSUE" \
        --run-id "$_RUN" \
        --artifacts-dir "$ARTIFACTS_DIR" \
        --clone-dir "$_CLONE" \
        --issue-json "$ARTIFACTS_DIR/issue.json" \
        --memory-file "$ARTIFACTS_DIR/memory-context.md" \
        ${SPEC_FILE:+--spec-file "$SPEC_FILE"} \
        --out "$ARTIFACTS_DIR/context-budget.json" || true
    depends_on: [setup-refine-branch, fetch-issue]
    when: "$parse-intent.output.intent == 'plan'"
    timeout: 30000

  # Layer 2b: Plan — generate implementation plan with architect review
  - id: plan
    command: dark-factory-plan
    depends_on: [budget-plan, setup-refine-branch, fetch-issue]
    when: "$parse-intent.output.intent == 'plan'"
    idle_timeout: 600000

  # Push refine branch after spec generation, then gate the issue for spec review.
  # The spec-pending-review label is what the scheduler's spec_advance_check keys on
  # (grace window + direct-to-pr auto-advance). Without it, refined items are re-dispatched
  # for refinement every poll. Labels are guaranteed to exist in the repo.
  - id: refine-push
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      BRANCH=$(git branch --show-current)

      git push -u origin "$BRANCH"
      gh issue edit "$ISSUE" --repo omniscient/markethawk --add-label spec-pending-review
      echo "Pushed $BRANCH for issue #$ISSUE (spec-pending-review gate applied)"
    depends_on: [refine]
    when: "$parse-intent.output.intent == 'refine'"
    timeout: 30000

  # Push plan branch (no longer auto-advances to Ready — plan-pending-review gate).
  # Applying the plan-pending-review label is the gate: the scheduler's plan_advance_check
  # keys on it (grace window + direct-to-pr auto-advance to Ready). Without it, planned items
  # are re-dispatched for planning every poll until the circuit-breaker trips (see #214).
  # Labels are guaranteed to exist in the repo.
  - id: plan-push-and-advance
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      BRANCH=$(git branch --show-current)

      git push -u origin "$BRANCH"
      gh issue edit "$ISSUE" --repo omniscient/markethawk --add-label plan-pending-review
      echo "Pushed $BRANCH for issue #$ISSUE (plan-pending-review gate applied)"
    depends_on: [plan]
    when: "$parse-intent.output.intent == 'plan'"
    timeout: 30000

  # Startup codeindex regeneration — runs before implement so the MCP tools serve a fresh index
  - id: update-codeindex
    bash: |
      if ! command -v codeindex &>/dev/null; then
        echo "WARNING: codeindex not available — skipping index regeneration"
        exit 0
      fi
      echo "Regenerating codeindex (startup pass)..."
      codeindex analyze . 2>/dev/null && echo "analyze: OK" || echo "WARNING: codeindex analyze failed"
      codeindex symbols . --inline 2>/dev/null && echo "symbols: OK" || echo "WARNING: codeindex symbols failed"
      echo "codeindex startup pass complete"
    depends_on: [setup-branch]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 120000

  # Context budget telemetry — captures pre-prompt token estimate for implement/continue phase.
  # INTENT is read from issue.json (new|continue); context_budget.py uses the distinct registry
  # entries for each: "continue" includes pr_reviews, "new" does not (per _SECTION_REGISTRY).
  - id: budget-implement
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      INTENT=$(jq -r '.intent' "$ARTIFACTS_DIR/issue.json")
      _CLONE="${CLONE_DIR:-.}"
      _RUN="${RUN_ID:-$(basename "${ARTIFACTS_DIR:-/tmp/budget}")}"
      # Assert INTENT is a known scenario before invoking context_budget.py so that
      # an unexpected value produces a visible error rather than a silent no-op.
      case "$INTENT" in
        new|continue) ;;
        *) echo "budget-implement: unexpected INTENT='$INTENT'; expected new or continue" >&2; exit 1 ;;
      esac
      # memory-context.md is written inside the command session by memory_retrieve.py (Phase 1
      # load). This applies to all of refine, plan, implement, continue — budget nodes always
      # run before the command. Reported as dropped/empty_or_missing; this is expected.
      python3 "$_CLONE/dark-factory/scripts/context_budget.py" \
        --scenario "$INTENT" \
        --issue-num "$ISSUE" \
        --run-id "$_RUN" \
        --artifacts-dir "$ARTIFACTS_DIR" \
        --clone-dir "$_CLONE" \
        --issue-json "$ARTIFACTS_DIR/issue.json" \
        --memory-file "$ARTIFACTS_DIR/memory-context.md" \
        --out "$ARTIFACTS_DIR/context-budget.json" || true
    depends_on: [update-codeindex, fetch-issue]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 30000

  # Layer 2: Implement the feature (status set to "In Progress" by entrypoint or epic resolver)
  - id: implement
    command: dark-factory-implement
    depends_on: [budget-implement, update-codeindex, fetch-issue]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    idle_timeout: 600000

  # Post-implement codeindex regeneration — refreshes the local index so the in-run MCP tools
  # (lookup_symbol / get_impact) see the final code. codeindex.json / symbolindex.json are
  # gitignored (regenerated on demand, see #343). docs/codeindex-hotspots.md is generated
  # locally for in-run use but NOT committed to the feature branch — post-merge refresh
  # happens in the post-merge-update-codeindex node. Non-fatal: if codeindex is unavailable
  # the run continues.
  - id: regen-codeindex
    bash: |
      if ! command -v codeindex &>/dev/null; then
        echo "WARNING: codeindex not available — skipping post-implement regeneration"
        exit 0
      fi
      echo "Regenerating codeindex (post-implement pass)..."
      codeindex analyze . 2>/dev/null || echo "WARNING: codeindex analyze failed"
      codeindex symbols . --output symbolindex.json 2>/dev/null || echo "WARNING: codeindex symbols failed"
      mkdir -p docs
      codeindex high-blast 2>/dev/null > docs/codeindex-hotspots.md.tmp \
        && mv docs/codeindex-hotspots.md.tmp docs/codeindex-hotspots.md \
        || echo "WARNING: codeindex high-blast failed — hotspots file unchanged"
      echo "codeindex hotspots generated locally (not committed — post-merge refresh via post-merge-update-codeindex)"
    depends_on: [implement]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 120000

  # De-conflict: merge main into branch, Tier 1 mechanical → Tier 2 AI → hard grep gate.
  # Shared between `continue` (runs after regen-codeindex) and `resolve` (runs after branch checkout).
  - id: de-conflict
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      ARTIFACTS_DIR="${ARTIFACTS_DIR:-/tmp/artifacts/${ISSUE}}"
      mkdir -p "$ARTIFACTS_DIR"
      # $CLONE_DIR is not exported into archon DAG bash nodes (sibling nodes use
      # paths relative to CWD, which is the clone root); fall back to "." so the
      # deconflict CLI resolves instead of hitting a nonexistent /dark-factory/...
      # path (exit 2). Recurring spurious-Blocked cause: #403/#391/#570/#394/#648.
      python3 "${CLONE_DIR:-.}/dark-factory/scripts/factory_core/cli.py" \
        deconflict --issue "$ISSUE"
    depends_on: [regen-codeindex, setup-branch-resolve]
    # OR-join of mutually-exclusive branches (continue vs resolve); the always-skipped
    # sibling must not skip this node. See checkTriggerRule in archon dag-executor.
    trigger_rule: none_failed_min_one_success
    when: "$parse-intent.output.intent == 'continue' || $parse-intent.output.intent == 'resolve'"
    timeout: 300000

  # Layer 2.5: Classify whether a preview environment is needed
  - id: preview-changeset
    bash: |
      echo "=== Changed files (main...HEAD) ==="
      git diff main...HEAD --name-only 2>/dev/null || true
      echo "=== Stat ==="
      git diff main...HEAD --stat 2>/dev/null || true
    depends_on: [regen-codeindex, fetch-issue]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 15000

  # Bench mode probe: outputs 'stub' when BENCH_MODE=stub, 'live' otherwise, so
  # classify-preview can gate on it (prevents a Haiku call during replay benchmark runs).
  # Unconditional and always emits a value: classify-preview's `when:` references this
  # output, and Archon's when-parser supports only simple/single-operator expressions —
  # NO parentheses. The parenthesized intent+probe compound (b675ecd) was unparseable,
  # so classify-preview skipped fail-closed and the all_success trigger-rule cascade
  # skipped validate/push-and-pr/report: every implement run exited 0 while silently
  # discarding its work (#397).
  - id: bench-mode-probe
    bash: |
      if [ "${BENCH_MODE:-}" = "stub" ]; then
        echo "stub"
      else
        echo "live"
      fi
    depends_on: [fetch-issue]
    timeout: 5000

  - id: classify-preview
    prompt: |
      You are a classifier deciding whether a dark-factory preview stack (postgres, redis, backend,
      frontend, celery) is needed for this branch's changeset. A wasted preview costs minutes; a
      wrongly skipped preview means a code change ships without live endpoint validation.

      ## Config kill-switch
      Read the preview.enabled flag from .claude/skills/refinement/config.yaml.
      If preview.enabled is false, ALWAYS output needs_preview=true regardless of the changeset.

      ## Changeset
      $preview-changeset.output

      ## Issue context (secondary signal only — the diff is authoritative)
      Title: $fetch-issue.output.title
      Labels: $fetch-issue.output.labels

      ## Classifier rubric

      Set needs_preview = false ONLY if EVERY changed file falls into one or more of these
      non-runtime-affecting categories:

      | Category        | Matches |
      |-----------------|---------|
      | Documentation   | *.md, *.mdx, anything under docs/ or Docs/, LICENSE |
      | Agent/workflow config | .archon/**, .claude/**, workflow YAML (NOT docker-compose* or app config) |
      | Tests           | backend/tests/**, **/*.test.ts(x), **/*.spec.ts(x), conftest.py, **/*_test.py, dark-factory/tests/** |
      | CI / repo meta  | .github/**, .gitignore, .pre-commit-config.yaml, lint/format config (.eslintrc*, .prettierrc*, ruff/flake8/mypy config), .editorconfig |

      Force needs_preview = true if ANY file touches the running app: backend/app/**, alembic/versions/**,
      requirements.txt, frontend/src/**, package.json, package-lock.json, Dockerfile*, docker-compose*,
      .env*, dark-factory/seed/**.

      Fail-safe: an empty changeset, a mix that is not clearly skip-only, or any uncertainty → needs_preview=true.
      The diff is authoritative — a documentation-labeled issue that touches backend/app/** still gets a preview.
    allowed_tools: [Read]
    model: haiku
    depends_on: [preview-changeset, fetch-issue, bench-mode-probe]
    # Intent gating (new/continue) is enforced structurally: preview-changeset only runs
    # for those intents, and its skip cascades here via the default all_success trigger
    # rule. Keep this `when:` in the parser-supported simple form (#397).
    when: "$bench-mode-probe.output == 'live'"
    output_format:
      type: object
      properties:
        needs_preview:
          type: boolean
        category:
          type: string
          enum: [code, docs, config, tests, ci, mixed]
        reason:
          type: string
      required: [needs_preview, category, reason]

  # Layer 3: Spin up preview and validate
  - id: preview-up
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      NEEDS_PREVIEW=$classify-preview.output.needs_preview
      SKIP_REASON="$classify-preview.output.reason"

      mkdir -p "$ARTIFACTS_DIR"
      BUILD_LOG="$ARTIFACTS_DIR/preview_build.log"

      # Single writer for preview_env.sh — every exit path MUST go through this so
      # downstream nodes (validate, push-and-pr, report) can always source the file.
      # args: skipped failed reason slot frontend backend net
      write_preview_env() {
        {
          echo "export PREVIEW_SKIPPED=$1"
          echo "export PREVIEW_FAILED=$2"
          echo "export PREVIEW_SKIP_REASON=\"$3\""
          echo "export PREVIEW_SLOT=\"$4\""
          echo "export PREVIEW_FRONTEND=\"$5\""
          echo "export PREVIEW_BACKEND=\"$6\""
          echo "export PREVIEW_NET=\"$7\""
        } > "$ARTIFACTS_DIR/preview_env.sh"
      }

      # Fail-proof degrade: a broken preview must never kill the run (it used to send the
      # ticket back to Ready in a loop). Note the failure on the ticket, mark the preview
      # as skipped+failed, and exit 0 so validate/push/PR proceed without live endpoints.
      preview_fail() {
        REASON="$1"
        echo "WARNING: preview failed: ${REASON} — continuing without preview" >&2
        write_preview_env true true "preview failed: ${REASON}" "" "" "" ""
        LOG_TAIL=""
        [ -f "$BUILD_LOG" ] && LOG_TAIL=$(tail -30 "$BUILD_LOG")
        gh issue comment "$ISSUE" --body "⚠️ **Preview environment failed to start** — ${REASON}

      The run continued in degraded mode (no live-endpoint validation; PR still created). Last build/boot output:
      \`\`\`
      ${LOG_TAIL:-<no build log captured>}
      \`\`\`
      The \`mh-preview-${ISSUE}\` stack was left as-is for debugging — tear down with \"Close issue #${ISSUE}\"." \
          || echo "WARNING: could not post preview-failure comment to issue #${ISSUE}" >&2
        echo "PREVIEW_SKIPPED=true"
        echo "PREVIEW_FAILED=true"
        echo "PREVIEW_SKIP_REASON=preview failed: ${REASON}"
        exit 0
      }

      # Bench mode stub: skip Docker entirely, write canned preview_env.sh, exit 0.
      # BENCH_MODE=stub: no preview stack (only push-and-pr is also stubbed).
      # BENCH_MODE=full: preview runs normally; only push-and-pr is stubbed (no junk PRs).
      if [ "${BENCH_MODE:-}" = "stub" ]; then
        echo "BENCH_MODE=stub: preview stubbed for issue #${ISSUE}"
        write_preview_env true false "bench mode stub — no preview stack" "" "" "" ""
        echo "PREVIEW_SKIPPED=true"
        echo "PREVIEW_SKIP_REASON=bench mode stub"
        exit 0
      fi

      # Skip ONLY on an explicit "false". Any other value (including garbled or errored
      # classifier output) falls through to building the preview — fail-safe direction.
      if [ "$NEEDS_PREVIEW" = "false" ]; then
        echo "Preview differentiator: skipping preview for issue #${ISSUE}"
        echo "Reason: ${SKIP_REASON}"
        write_preview_env true false "${SKIP_REASON}" "" "" "" ""
        echo "PREVIEW_SKIPPED=true"
        echo "PREVIEW_SKIP_REASON=${SKIP_REASON}"
        exit 0
      fi

      # Preview ports follow 1{SLOT}{suffix} (e.g. slot 03 -> frontend 10333, backend 10380).
      # Collision-free allocation: recover the slot from the already-running preview stack (Continue runs),
      # or scan docker ps for occupied 1PP33->3333 frontend ports and pick the lowest free 2-digit slot.
      PADDED=""
      EXISTING_PORT=$(docker ps \
        --filter "label=com.docker.compose.project=mh-preview-${ISSUE}" \
        --format '{{.Ports}}' 2>/dev/null \
        | grep -oP '(?<=:)1\d{4}(?=->3333)' | head -1 || true)
      if [ -n "$EXISTING_PORT" ]; then
        PADDED=$(printf "%02d" $(( (EXISTING_PORT - 10000) / 100 )))
        echo "INFO: Recovered slot ${PADDED} from existing preview for issue #${ISSUE}" >&2
      else
        USED_SLOTS=$(docker ps --format '{{.Ports}}' 2>/dev/null \
          | grep -oP '(?<=:)1\d{4}(?=->3333)' \
          | while read -r PORT; do printf "%02d\n" $(( (PORT - 10000) / 100 )); done \
          | sort -u || true)
        for i in $(seq 0 99); do
          SLOT=$(printf "%02d" $i)
          if ! echo "$USED_SLOTS" | grep -qx "$SLOT"; then
            PADDED="$SLOT"
            break
          fi
        done
        if [ -z "$PADDED" ]; then
          preview_fail "no free preview slot in range 00-99 — run 'Close issue #N' on a stale preview to free one"
        fi
        echo "INFO: Allocated slot ${PADDED} for issue #${ISSUE}" >&2
      fi
      export ISSUE_NUM_PADDED="$PADDED"
      export POLYGON_API_KEY="${POLYGON_API_KEY:-}"

      PREVIEW_START=$(date +%s)
      echo "Starting preview stack mh-preview-${ISSUE} (ports: 1${PADDED}33, 1${PADDED}80)..."

      # Pre-bake images via the remote BuildKit daemon (tcp://buildkit:1234 on factory-network).
      # buildx talks to buildkitd directly over TCP — never the proxied docker.sock — so it
      # sidesteps the connection-hijack the socket-proxy blocks (#436). --load then imports the
      # result into dockerd via POST /images/load (allowed by the proxy), so `up -d` finds the
      # images locally. Build/boot noise goes to the build log, NOT stdout: this node's stdout
      # becomes the preview-up node output, and oversized node output triggered the E2BIG loop.
      export PREVIEW_BACKEND_IMAGE="mh-preview-${ISSUE}-backend:latest"
      export PREVIEW_FRONTEND_IMAGE="mh-preview-${ISSUE}-frontend:latest"
      BUILDKIT_ADDR="tcp://${BUILDKIT_HOST:-buildkit}:${BUILDKIT_PORT:-1234}"
      # Builder is per-run (the run container is ephemeral); ignore "already exists" on re-run.
      docker buildx create --name preview-remote --driver remote "$BUILDKIT_ADDR" >> "$BUILD_LOG" 2>&1 || true
      echo "Building ${PREVIEW_BACKEND_IMAGE} via remote BuildKit..."
      if ! docker buildx build --builder preview-remote --load \
        -t "$PREVIEW_BACKEND_IMAGE" -f backend/Dockerfile backend >> "$BUILD_LOG" 2>&1; then
        preview_fail "buildx build of backend image failed (see preview_build.log tail below)"
      fi
      echo "Building ${PREVIEW_FRONTEND_IMAGE} via remote BuildKit..."
      if ! docker buildx build --builder preview-remote --load \
        -t "$PREVIEW_FRONTEND_IMAGE" -f frontend/Dockerfile frontend >> "$BUILD_LOG" 2>&1; then
        preview_fail "buildx build of frontend image failed (see preview_build.log tail below)"
      fi

      # Bring the stack up WITHOUT --build (images are pre-baked). The one-shot `migrate` service
      # applies the schema (alembic upgrade head) and gates backend/celery startup; a migrate
      # failure makes `up -d` exit non-zero (compose aborts on a failed
      # service_completed_successfully dependency), so it is caught here.
      if ! docker compose -p "mh-preview-${ISSUE}" \
        -f dark-factory/docker-compose.preview.yml \
        up -d >> "$BUILD_LOG" 2>&1; then
        preview_fail "docker compose up failed (migrate/boot — see preview_build.log tail below)"
      fi

      PREVIEW_NET="mh-preview-${ISSUE}_preview-network"
      # Connect to the preview network so we can reach the backend by container hostname.
      # We stay connected for the lifetime of this job — the validate command step that
      # follows needs direct network access to run endpoint smoke tests.  Disconnect
      # happens in the validate step's cleanup (or on container exit).
      docker network connect "$PREVIEW_NET" "$(hostname)" 2>/dev/null || true

      # Backend is reachable inside the preview network via its container hostname.
      # Using the container hostname avoids the localhost:<hostPort> approach, which
      # does not work when the dark-factory container and the preview containers are on
      # different Docker networks (the host port IS reachable from the Docker host but
      # NOT from inside another container).
      BACKEND_HOSTNAME="mh-preview-${ISSUE}-backend-1"
      BACKEND_INTERNAL="http://${BACKEND_HOSTNAME}:8000"

      # Poll the backend container's healthcheck via `docker inspect` (GET /containers/<id>/json,
      # allowed by the proxy via CONTAINERS:1) instead of `docker compose exec` (proxy is EXEC:0,
      # and exec-start also needs the connection-hijack the proxy can't forward). The backend
      # service defines an /api/health healthcheck, so State.Health.Status flips to "healthy".
      echo "Waiting for backend health..."
      for i in $(seq 1 60); do
        HEALTH=$(docker inspect --format '{{.State.Health.Status}}' "$BACKEND_HOSTNAME" 2>/dev/null || echo "missing")
        if [ "$HEALTH" = "healthy" ]; then
          PREVIEW_SECS=$(( $(date +%s) - PREVIEW_START ))
          echo "Backend healthy!"
          echo "PREVIEW_SLOT=${PADDED}"
          echo "PREVIEW_FRONTEND=http://localhost:1${PADDED}33"
          echo "PREVIEW_BACKEND=${BACKEND_INTERNAL}"
          echo "PREVIEW_MOUNT_SECS=${PREVIEW_SECS}"
          # Write env file so downstream nodes (validate, push-and-pr, report) can source
          # it reliably without having to parse raw step output or guess the URL.
          write_preview_env false false "" "${PADDED}" "http://localhost:1${PADDED}33" "${BACKEND_INTERNAL}" "${PREVIEW_NET}"
          exit 0
        fi
        sleep 3
      done
      docker network disconnect "$PREVIEW_NET" "$(hostname)" 2>/dev/null || true
      docker compose -p "mh-preview-${ISSUE}" -f dark-factory/docker-compose.preview.yml \
        logs --tail 40 backend >> "$BUILD_LOG" 2>&1 || true
      preview_fail "backend did not become healthy within 180s"
    depends_on: [classify-preview]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    # Budget covers two remote buildx builds + migrate gate + up-to-180s health poll.
    # Warm buildkit cache (the steady state) builds both images in ~40s; a full-cold cache
    # is ~300s and a cold build under concurrent-run contention can exceed 420s (#436 hit
    # this). 600000 covers a cold rebuild with headroom without over-waiting on a real hang.
    timeout: 600000

  # preview-up-resolve: resolve runs skip the preview stack — validate uses pytest/tsc only
  - id: preview-up-resolve
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      ARTIFACTS_DIR="${ARTIFACTS_DIR:-/tmp/artifacts/${ISSUE}}"
      mkdir -p "$ARTIFACTS_DIR"
      {
        echo "export PREVIEW_SKIPPED=true"
        echo "export PREVIEW_FAILED=false"
        echo "export PREVIEW_SKIP_REASON=\"conflict resolution run — no preview rebuild\""
        echo "export PREVIEW_SLOT=\"\""
        echo "export PREVIEW_FRONTEND=\"\""
        echo "export PREVIEW_BACKEND=\"\""
        echo "export PREVIEW_NET=\"\""
      } > "$ARTIFACTS_DIR/preview_env.sh"
      echo "PREVIEW_SKIPPED=true"
      echo "PREVIEW_SKIP_REASON=conflict resolution run — no preview rebuild"
    depends_on: [de-conflict]
    when: "$parse-intent.output.intent == 'resolve'"
    timeout: 15000

  - id: validate
    command: dark-factory-validate
    depends_on: [preview-up, preview-up-resolve]
    # OR-join: preview-up (new/continue) and preview-up-resolve (resolve) are mutually
    # exclusive, so one is always skipped. Without this, all_success skips validate every run.
    trigger_rule: none_failed_min_one_success
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue' || $parse-intent.output.intent == 'resolve'"
    idle_timeout: 300000

  # Context budget telemetry — captures pre-prompt token estimate for conformance phase
  - id: budget-conformance
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      _CLONE="${CLONE_DIR:-.}"
      _RUN="${RUN_ID:-$(basename "${ARTIFACTS_DIR:-/tmp/budget}")}"
      SPEC_FILE=$(grep -rl "#${ISSUE}" "$_CLONE/docs/superpowers/specs/" 2>/dev/null | head -1 || true)
      # review_diff.txt is written inside the conformance command session, not before it.
      # Use three-dot (matches what dark-factory-conformance.md sends to Claude) for telemetry
      # fidelity. Note: three-dot is intentional here (measure what command loads), NOT for
      # OOS detection (which uses two-dot per codebase-patterns.md).
      DIFF_TMP=$(mktemp)
      git diff main...HEAD > "$DIFF_TMP" 2>/dev/null || true
      python3 "$_CLONE/dark-factory/scripts/context_budget.py" \
        --scenario conformance \
        --issue-num "$ISSUE" \
        --run-id "$_RUN" \
        --artifacts-dir "$ARTIFACTS_DIR" \
        --clone-dir "$_CLONE" \
        ${SPEC_FILE:+--spec-file "$SPEC_FILE"} \
        --impl-file "$ARTIFACTS_DIR/implementation.md" \
        --diff-file "$DIFF_TMP" \
        --out "$ARTIFACTS_DIR/context-budget.json" || true
      rm -f "$DIFF_TMP"
    depends_on: [validate]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 30000

  # Layer 3.5: Verify implementation conforms to spec (Gate 2 — code vs spec)
  - id: conformance
    command: dark-factory-conformance
    depends_on: [budget-conformance, validate]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    idle_timeout: 600000

  # push-resolve: push conflict-resolved branch to the existing PR (no new PR created)
  - id: push-resolve
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      BRANCH=$(git branch --show-current)
      echo "Pushing conflict-resolved branch ${BRANCH} to existing PR for issue #${ISSUE}..."
      if ! git push origin "$BRANCH"; then
        echo "ERROR: git push failed for '${BRANCH}'" >&2
        exit 1
      fi
      if ! git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
        echo "ERROR: branch '$BRANCH' is not on origin after push — aborting" >&2
        exit 1
      fi
      PR_NUM=$(gh pr list --repo omniscient/markethawk --head "$BRANCH" \
        --json number --jq '.[0].number // empty')
      echo "Pushed branch ${BRANCH} to PR #${PR_NUM:-unknown}"
      echo "PR_NUM=${PR_NUM:-}"
    depends_on: [validate]
    when: "$parse-intent.output.intent == 'resolve'"
    timeout: 30000

  # Layer 4: Push and create PR
  - id: push-and-pr
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      EPIC_NUM=$(jq -r '.epic_number // empty' "$ARTIFACTS_DIR/issue.json")
      # Source preview state from the artifact file — never dollar-reference the preview-up
      # node output here (Archon substitutes it textually, even in comments). Each reference
      # embeds the node's full stdout into this script's argv; 4 references overflowed the
      # 128KiB argv limit → E2BIG (#250 loop).
      PREVIEW_SKIPPED=true
      PREVIEW_SKIP_REASON="preview_env.sh missing"
      PREVIEW_FAILED=false
      [ -f "$ARTIFACTS_DIR/preview_env.sh" ] && . "$ARTIFACTS_DIR/preview_env.sh"
      BRANCH=$(git branch --show-current)

      # Bench mode stub: skip push and PR creation entirely.
      # The implementation is already committed locally; downstream code-review reads git diff.
      # BENCH_MODE=stub: no push, no PR. BENCH_MODE=full: no PR but push still happens.
      if [ "${BENCH_MODE:-}" = "stub" ]; then
        echo "BENCH_MODE=stub: skipping push and PR creation for issue #${ISSUE} (branch: ${BRANCH})"
        echo "BENCH_MODE_STUB=true"
        exit 0
      fi

      echo "Pushing branch and creating/updating PR for issue #${ISSUE}..."

      # Archive spec/plan for this issue before pushing
      SPEC_FILE=$(grep -rl "#${ISSUE}" docs/superpowers/specs/ 2>/dev/null | head -1)
      PLAN_FILE=$(grep -rl "#${ISSUE}" docs/superpowers/plans/ 2>/dev/null | head -1)

      ARCHIVED=0
      if [ -n "$SPEC_FILE" ]; then
        mkdir -p docs/archive
        git mv "$SPEC_FILE" docs/archive/
        ARCHIVED=$((ARCHIVED + 1))
        echo "Archived spec: $SPEC_FILE -> docs/archive/"
      fi
      if [ -n "$PLAN_FILE" ]; then
        mkdir -p docs/archive
        git mv "$PLAN_FILE" docs/archive/
        ARCHIVED=$((ARCHIVED + 1))
        echo "Archived plan: $PLAN_FILE -> docs/archive/"
      fi

      if [ "$ARCHIVED" -gt 0 ]; then
        git commit -m "docs: archive spec/plan for issue #${ISSUE}"
      fi

      # Fail loudly if the push is rejected (e.g. token missing 'workflow' scope for .github/workflows
      # changes). Previously the rejection was swallowed and a misleading success comment was posted.
      if ! git push -u origin "$BRANCH"; then
        echo "ERROR: git push failed for '$BRANCH' — aborting before PR creation." >&2
        exit 1
      fi

      # Confirm the branch actually landed on origin; gh pr create cannot work otherwise.
      if ! git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
        echo "ERROR: branch '$BRANCH' is not on origin after push — aborting." >&2
        exit 1
      fi

      # --- Blast radius report (codeindex advisory) ---
      BLAST_SECTION=""
      if command -v codeindex &>/dev/null; then
        CHANGED_FILES=$(git diff main...HEAD --name-only 2>/dev/null | head -50 || true)
        if [ -n "$CHANGED_FILES" ]; then
          BLAST_OUTPUT=$(echo "$CHANGED_FILES" | xargs codeindex impact 2>/dev/null || true)
          if [ -n "$BLAST_OUTPUT" ]; then
            BLAST_SECTION=$(printf "\n\n## Blast radius\n\n\`\`\`\n%s\n\`\`\`" "$BLAST_OUTPUT")
          fi
        fi
      fi

      # --- Build the Preview section ---
      if [ "$PREVIEW_FAILED" = "true" ]; then
        PREVIEW_SECTION="⚠️ _Preview environment failed to start (${PREVIEW_SKIP_REASON}) — endpoint validation was skipped; see the failure comment on the issue._"
      elif [ "$PREVIEW_SKIPPED" = "true" ]; then
        PREVIEW_SECTION="_No preview environment — this change does not affect the running app (${PREVIEW_SKIP_REASON})._"
      else
        PREVIEW_SECTION="- Frontend: ${PREVIEW_FRONTEND}
      - Backend API: ${PREVIEW_BACKEND}/docs"
      fi

      EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
      if [ -n "$EXISTING_PR" ]; then
        echo "PR #${EXISTING_PR} already exists, updated with latest push."
        # Backfill the closing keyword on PRs created before it was added — without
        # "Closes #N" GitHub never attaches the PR to the issue's Development sidebar.
        EXISTING_BODY=$(gh pr view "$EXISTING_PR" --json body --jq '.body')
        if ! echo "$EXISTING_BODY" | grep -qiE "(close[sd]?|fix(e[sd])?|resolve[sd]?) #${ISSUE}\b"; then
          gh pr edit "$EXISTING_PR" --body "Closes #${ISSUE}

      ${EXISTING_BODY}" && echo "Added 'Closes #${ISSUE}' to PR #${EXISTING_PR} body" \
            || echo "WARNING: could not backfill closing keyword on PR #${EXISTING_PR}" >&2
        fi
        echo "$EXISTING_PR"
      else
        EPIC_LINE=""
        if [ -n "$EPIC_NUM" ]; then
          EPIC_LINE="
      **Epic:** #${EPIC_NUM}"
        fi
        PR_URL=$(gh pr create \
          --title "$(gh issue view $ISSUE --json title --jq '.title')" \
          --body "Closes #${ISSUE}

      ## Summary
      Automated implementation for issue #${ISSUE}.${EPIC_LINE}

      ## Preview
      ${PREVIEW_SECTION}

      ## Commands
      \`\`\`bash
      # Iterate after feedback
      docker compose --profile factory run --rm dark-factory \"Continue issue #${ISSUE}\"

      # Tear down preview when done
      docker compose --profile factory run --rm dark-factory \"Close issue #${ISSUE}\"
      \`\`\`
      ${BLAST_SECTION}
      ---
      *Generated by MarketHawk Dark Factory*" \
          --draft)
        # gh pr create prints the PR URL on success; empty output means creation failed.
        if [ -z "$PR_URL" ]; then
          echo "ERROR: gh pr create produced no URL — PR was not created." >&2
          exit 1
        fi
        echo "Created PR: $PR_URL"
      fi
    depends_on: [conformance]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 30000

  # Context budget telemetry — captures pre-prompt token estimate for code-review phase
  - id: budget-code-review
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      _CLONE="${CLONE_DIR:-.}"
      _RUN="${RUN_ID:-$(basename "${ARTIFACTS_DIR:-/tmp/budget}")}"
      # The code-review diff is produced inside the command session (branch is already pushed
      # at this point — push-and-pr ran). Use three-dot to match what dark-factory-code-review.md
      # sends to Claude (telemetry fidelity). Not for OOS detection (which uses two-dot).
      DIFF_TMP=$(mktemp)
      git diff main...HEAD > "$DIFF_TMP" 2>/dev/null || true
      python3 "$_CLONE/dark-factory/scripts/context_budget.py" \
        --scenario code-review \
        --issue-num "$ISSUE" \
        --run-id "$_RUN" \
        --artifacts-dir "$ARTIFACTS_DIR" \
        --clone-dir "$_CLONE" \
        --issue-json "$ARTIFACTS_DIR/issue.json" \
        --diff-file "$DIFF_TMP" \
        --out "$ARTIFACTS_DIR/context-budget.json" || true
      rm -f "$DIFF_TMP"
    depends_on: [push-and-pr]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 30000

  # Layer 4.5: AI code review of the diff (Gate 3 — correctness/security)
  - id: code-review
    command: dark-factory-code-review
    depends_on: [budget-code-review, push-and-pr]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    idle_timeout: 600000

  # Layer 4.6: Auto-address advisory findings from code review
  - id: revise-advisory
    command: dark-factory-revise-advisory
    depends_on: [code-review]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    idle_timeout: 600000

  # Layer 5: Move to "In review" and post report
  - id: status-in-review
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      INTENT=$parse-intent.output.intent
      # For resolve: the issue is already In Review — confirm without a board move.
      if [ "$INTENT" = "resolve" ]; then
        echo "resolve: issue #${ISSUE} already In Review — no board move needed"
        exit 0
      fi
      echo "Moving issue #${ISSUE} to In Review..."
      ITEM_ID=$(gh project item-list 1 --owner omniscient --format json --limit 200 \
        | jq -r ".items[] | select(.content.number == $ISSUE and .content.type == \"Issue\") | .id")
      if [ -n "$ITEM_ID" ]; then
        gh project item-edit \
          --project-id PVT_kwHOAAFds84BWh4w \
          --id "$ITEM_ID" \
          --field-id PVTSSF_lAHOAAFds84BWh4wzhR1VaA \
          --single-select-option-id df73e18b
        echo "Moved issue #$ISSUE to In Review"
      else
        echo "WARNING: Issue #$ISSUE not found on project board"
      fi
    depends_on: [push-and-pr, push-resolve, code-review, revise-advisory]
    # OR-join: push-and-pr/code-review/revise-advisory (new/continue) vs push-resolve (resolve) are
    # mutually exclusive. Tolerate skipped siblings; still skip if a real upstream failed.
    trigger_rule: none_failed_min_one_success
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue' || $parse-intent.output.intent == 'resolve'"
    timeout: 15000

  - id: report
    bash: |
      ISSUE=$(jq -r '.resolved_number' "$ARTIFACTS_DIR/issue.json")
      EPIC_NUM=$(jq -r '.epic_number // empty' "$ARTIFACTS_DIR/issue.json")
      # Source preview state from the artifact file — see push-and-pr for why dollar-
      # referencing the preview-up node output here is forbidden (argv-limit E2BIG).
      PREVIEW_SKIPPED=true
      PREVIEW_SKIP_REASON="preview_env.sh missing"
      PREVIEW_FAILED=false
      [ -f "$ARTIFACTS_DIR/preview_env.sh" ] && . "$ARTIFACTS_DIR/preview_env.sh"
      INTENT=$parse-intent.output.intent
      BRANCH=$(git branch --show-current)
      echo "Posting summary to issue #${ISSUE}..."

      PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
      PR_LINE=""
      [ -n "$PR_NUM" ] && PR_LINE="**PR:** #${PR_NUM}"

      EPIC_LINE=""
      [ -n "$EPIC_NUM" ] && EPIC_LINE="**Epic:** #${EPIC_NUM}"

      ACTION="New implementation"
      [ "$INTENT" = "continue" ] && ACTION="Continued iteration"
      [ "$INTENT" = "resolve" ] && ACTION="Conflict resolution"

      CHANGES=""
      if [ -f "$ARTIFACTS_DIR/implementation.md" ]; then
        CHANGES=$(cat "$ARTIFACTS_DIR/implementation.md")
      fi

      CONFORMANCE_SECTION=""
      if [ -f "$ARTIFACTS_DIR/conformance.md" ]; then
        CONFORMANCE_STATUS=$(grep '^STATUS:' "$ARTIFACTS_DIR/conformance.md" | cut -d' ' -f2)
        case "$CONFORMANCE_STATUS" in
          PASS)
            CONFORMANCE_VERDICT=$(grep '^VERDICT:' "$ARTIFACTS_DIR/conformance.md" | cut -d' ' -f2)
            CONFORMANCE_CYCLES=$(grep '^CYCLES:' "$ARTIFACTS_DIR/conformance.md" | cut -d' ' -f2)
            NO_SPEC=$(grep '^NO_SPEC:' "$ARTIFACTS_DIR/conformance.md" | cut -d' ' -f2)
            OOS_EXCISED=$(grep '^OOS_EXCISED:' "$ARTIFACTS_DIR/conformance.md" | cut -d' ' -f2)
            OOS_TICKETS=$(grep '^OOS_TICKETS:' "$ARTIFACTS_DIR/conformance.md" | cut -d' ' -f2-)
            ATTESTATION=$(sed -n '/^---$/,$ p' "$ARTIFACTS_DIR/conformance.md" | tail -n +2)
            CONFORMANCE_SECTION=$(printf "### Spec Conformance\n\n%s" "${ATTESTATION}")
            if [ "${NO_SPEC}" = "true" ]; then
              CONFORMANCE_SECTION=$(printf "%s\n\n_Advisory-only: no spec found; reviewed against issue body._" "${CONFORMANCE_SECTION}")
            fi
            # Surface scope outcome if any OOS changes were found
            if [ -n "${OOS_EXCISED}" ] && [ "${OOS_EXCISED}" != "0" ]; then
              TICKET_REFS=$(echo "${OOS_TICKETS}" | tr ' ' '\n' | grep -v '^$' | sed 's/^/#/' | tr '\n' ' ')
              CONFORMANCE_SECTION=$(printf "%s\n\n**Scope enforcement:** excised %s out-of-scope change(s) → %s" \
                "${CONFORMANCE_SECTION}" "${OOS_EXCISED}" "${TICKET_REFS}")
            fi
            ;;
          SKIPPED)
            CONFORMANCE_SECTION=$(printf "### Spec Conformance\n\n_Conformance check disabled (conformance.enabled=false)._")
            ;;
          *)
            CONFORMANCE_SECTION=""
            ;;
        esac
      fi

      BLAST_GATE_SECTION=""
      if [ -f "$ARTIFACTS_DIR/blast.md" ]; then
        BLAST_STATUS=$(grep '^STATUS:' "$ARTIFACTS_DIR/blast.md" | cut -d' ' -f2)
        BLAST_TRIGGER=$(grep '^TRIGGER:' "$ARTIFACTS_DIR/blast.md" | cut -d' ' -f2-)
        case "$BLAST_STATUS" in
          PASS)
            BLAST_GATE_SECTION=$(printf "### Blast-Radius Gate\n\n✅ Passed — no high-risk files detected.")
            ;;
          HUMAN_REQUIRED)
            BLAST_GATE_SECTION=$(printf "### Blast-Radius Gate\n\n⛔ Blocked — trigger: %s. Human approval required; see issue comment for details." "${BLAST_TRIGGER:-unknown}")
            ;;
          SKIPPED)
            BLAST_GATE_SECTION=$(printf "### Blast-Radius Gate\n\n_Blast-radius gate disabled (blast_radius.enabled=false)._")
            ;;
          *)
            BLAST_GATE_SECTION=""
            ;;
        esac
      fi

      CODE_REVIEW_SECTION=""
      if [ -f "$ARTIFACTS_DIR/review.md" ]; then
        CR_STATUS=$(grep '^STATUS:' "$ARTIFACTS_DIR/review.md" | cut -d' ' -f2)
        CR_BLOCKERS=$(grep '^BLOCKERS:' "$ARTIFACTS_DIR/review.md" | cut -d' ' -f2)
        CR_ADVISORY=$(grep '^ADVISORY:' "$ARTIFACTS_DIR/review.md" | cut -d' ' -f2)
        case "$CR_STATUS" in
          PASS)
            CODE_REVIEW_SECTION=$(printf "### Code Review\n\n✅ Passed — %s advisory finding(s), 0 blocking. See PR review comments." "${CR_ADVISORY:-0}")
            ;;
          BLOCKED)
            CODE_REVIEW_SECTION=$(printf "### Code Review\n\n⛔ Blocked — %s blocking finding(s). Issue moved to Blocked; see PR review comments." "${CR_BLOCKERS:-0}")
            ;;
          SKIPPED)
            CODE_REVIEW_SECTION=$(printf "### Code Review\n\n_Code review disabled (code_review.enabled=false)._")
            ;;
          ERROR)
            CODE_REVIEW_SECTION=$(printf "### Code Review\n\n_Code review could not complete (advisory; did not block)._")
            ;;
          *)
            CODE_REVIEW_SECTION=""
            ;;
        esac
      fi

      # --- Build the Preview Environment section ---
      if [ "$INTENT" = "resolve" ]; then
        PREVIEW_SECTION="_No preview environment — conflict resolution run._"
      elif [ "$PREVIEW_FAILED" = "true" ]; then
        PREVIEW_SECTION="⚠️ _Preview environment failed to start (${PREVIEW_SKIP_REASON}) — endpoint validation was skipped; see the failure comment above._"
      elif [ "$PREVIEW_SKIPPED" = "true" ]; then
        PREVIEW_SECTION="_No preview environment — this change does not affect the running app (${PREVIEW_SKIP_REASON})._"
      else
        PREVIEW_SECTION="| Service | URL |
      |---------|-----|
      | Frontend | ${PREVIEW_FRONTEND} |
      | Backend API | ${PREVIEW_BACKEND} |
      | API Docs | ${PREVIEW_BACKEND}/docs |
      | PostgreSQL | \`localhost:1${PREVIEW_SLOT}54\` |
      | Redis | \`localhost:1${PREVIEW_SLOT}63\` |"
      fi

      CONFLICT_SECTION=""
      if [ -f "$ARTIFACTS_DIR/conflict_resolution.md" ]; then
        VERDICT=$(grep '^CONFLICT_VERDICT=' "$ARTIFACTS_DIR/conflict_resolution.md" | cut -d= -f2-)
        if [ -n "$VERDICT" ] && [ "$VERDICT" != "none" ]; then
          FILES_C=$(grep '^FILES_CONFLICTED=' "$ARTIFACTS_DIR/conflict_resolution.md" | cut -d= -f2-)
          T1=$(grep '^TIER1_RESOLVED=' "$ARTIFACTS_DIR/conflict_resolution.md" | cut -d= -f2-)
          T2=$(grep '^TIER2_RESOLVED=' "$ARTIFACTS_DIR/conflict_resolution.md" | cut -d= -f2-)
          CONFLICT_SECTION=$(printf "\n### Conflict Resolution\n\n- Files in conflict: %s\n- Tier 1 resolved: %s\n- Tier 2 resolved: %s\n- Verdict: %s" \
            "${FILES_C:-0}" "${T1:-0}" "${T2:-0}" "${VERDICT:-unknown}")
        fi
      fi

      gh issue comment "$ISSUE" --body "## Dark Factory Run — ${ACTION}

      ${PR_LINE}
      ${EPIC_LINE}
      **Branch:** \`${BRANCH}\`

      ### Changes

      ${CHANGES:-_No implementation summary available._}

      ${BLAST_GATE_SECTION}

      ${CONFORMANCE_SECTION}
      ${CODE_REVIEW_SECTION}
      ${CONFLICT_SECTION}

      ### Preview Environment

      ${PREVIEW_SECTION}

      ### Commands
      \`\`\`bash
      # Iterate after review
      docker compose --profile factory run --rm dark-factory \"Continue issue #${ISSUE}\"

      # Tear down when done
      docker compose --profile factory run --rm dark-factory \"Close issue #${ISSUE}\"
      \`\`\`

      ---
      *Posted by MarketHawk Dark Factory*"

      echo "Report posted to issue #${ISSUE}"
    depends_on: [status-in-review, code-review]
    # OR-join: code-review (new/continue) is skipped on resolve runs. Tolerate the skipped
    # sibling so the report still posts; skip only if a real upstream failed.
    trigger_rule: none_failed_min_one_success
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue' || $parse-intent.output.intent == 'resolve'"
    timeout: 15000
