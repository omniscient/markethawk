name: archon-dark-factory
description: |
  Use when: Running inside the dark-factory Docker container to implement a GitHub issue.
  Triggers: "Fix issue", "Continue issue", "Close issue", "Refine issue", "Plan issue".
  Does: Parses intent -> fetches issue context -> branches -> implements/refines/plans ->
        spins up preview stack (implement only) -> validates -> pushes and creates PR/spec/plan.
  NOT for: Running outside the dark-factory container.

provider: claude
model: sonnet

worktree:
  enabled: false

nodes:
  # Layer 0: Parse the command and fetch issue context
  - id: parse-intent
    prompt: |
      Parse this command and extract two things:
      1. The GitHub issue number
      2. The intent: "new" (first time working on this issue), "continue" (iterate on existing work), "close" (merge and tear down), "refine" (generate a design spec), or "plan" (generate an implementation plan)

      Command: $ARGUMENTS

      Output ONLY valid JSON, nothing else:
      {"issue_number": <int>, "intent": "<new|continue|close|refine|plan>"}
    allowed_tools: []
    model: haiku
    output_format:
      type: object
      properties:
        issue_number:
          type: integer
        intent:
          type: string
          enum: [new, continue, close, refine, plan]
      required: [issue_number, intent]

  - id: fetch-issue
    bash: |
      N=$parse-intent.output.issue_number
      INTENT=$parse-intent.output.intent
      EPIC_N=""
      ISSUE_DATA=$(gh issue view "$N" --json title,body,labels,comments)

      # --- Epic resolution: never implement an epic monolithically ---
      IS_EPIC=$(echo "$ISSUE_DATA" | jq -r 'if [.labels[].name] | index("epic") then "yes" else "no" end')

      if [ "$IS_EPIC" = "yes" ]; then
        echo "Issue #$N is an epic — resolving to next sub-issue..." >&2
        BODY=$(echo "$ISSUE_DATA" | jq -r '.body // ""')
        SUB_ISSUES=$(echo "$BODY" | grep -oP '\- \[ \] #\K\d+' || true)

        if [ -z "$SUB_ISSUES" ]; then
          echo "ERROR: Epic #$N has no unchecked sub-issues (expected '- [ ] #NN' entries)" >&2
          exit 1
        fi

        RESOLVED=""
        for SUB in $SUB_ISSUES; do
          STATE=$(gh issue view "$SUB" --json state --jq '.state')
          if [ "$STATE" != "OPEN" ]; then
            echo "  #$SUB — closed, skipping" >&2
            continue
          fi
          HAS_PR=$(gh pr list --search "head:feat/issue-${SUB}-" --json number --jq '.[0].number // empty')
          if ([ "$INTENT" = "continue" ] || [ "$INTENT" = "close" ]) && [ -n "$HAS_PR" ]; then
            echo "  #$SUB — has open PR, picking for $INTENT" >&2
            RESOLVED="$SUB"
            break
          elif [ "$INTENT" != "continue" ] && [ "$INTENT" != "close" ] && [ -z "$HAS_PR" ]; then
            echo "  #$SUB — open and no PR, starting this one" >&2
            RESOLVED="$SUB"
            break
          else
            echo "  #$SUB — skipping (intent=$INTENT, has_pr=${HAS_PR:-none})" >&2
          fi
        done

        # Fallback for continue/close: if no sub-issue has a PR, pick first open one
        if [ -z "$RESOLVED" ] && ([ "$INTENT" = "continue" ] || [ "$INTENT" = "close" ]); then
          for SUB in $SUB_ISSUES; do
            STATE=$(gh issue view "$SUB" --json state --jq '.state')
            if [ "$STATE" = "OPEN" ]; then
              echo "  Fallback: picking first open sub-issue #$SUB" >&2
              RESOLVED="$SUB"
              break
            fi
          done
        fi

        if [ -z "$RESOLVED" ]; then
          echo "ERROR: All sub-issues in epic #$N are closed or already have PRs" >&2
          exit 1
        fi

        echo "Resolved epic #$N → sub-issue #$RESOLVED" >&2
        EPIC_N="$N"
        N="$RESOLVED"
        ISSUE_DATA=$(gh issue view "$N" --json title,body,labels,comments)
      fi

      # --- Fetch PR review comments if a PR exists for this issue ---
      PR_NUM=$(gh pr list --search "head:feat/issue-${N}-" --json number --jq '.[0].number // empty')
      if [ -n "$PR_NUM" ]; then
        PR_COMMENTS=$(gh pr view "$PR_NUM" --json reviews,comments,reviewRequests)
        INLINE_COMMENTS=$(gh api "repos/omniscient/markethawk/pulls/$PR_NUM/comments" \
          --jq '[.[] | {path: .path, line: .line, body: .body, created_at: .created_at}]' 2>/dev/null || echo '[]')
        ISSUE_DATA=$(echo "$ISSUE_DATA" \
          | jq --argjson pr "$PR_COMMENTS" --argjson inline "$INLINE_COMMENTS" \
            '. + {pr_reviews: $pr, pr_inline_comments: $inline}')
      fi
      echo "$ISSUE_DATA" | jq \
        --arg intent "$INTENT" \
        --argjson resolved "$N" \
        --arg epic "${EPIC_N:-null}" \
        '. + {intent: $intent, resolved_number: $resolved, epic_number: (if $epic == "null" then null else ($epic | tonumber) end)}'
    depends_on: [parse-intent]
    timeout: 60000

  # Layer 0.5: Acknowledge feedback (continue flow only)
  - id: summarize-feedback
    prompt: |
      You are reviewing feedback on a code implementation. Below is the issue and PR data.
      Focus only on human-authored feedback — ignore any comments from "Dark Factory" or other bots.
      Summarize the feedback in 2-3 sentences covering what changes the reviewer wants made.
      If there is no meaningful human feedback, respond with: {"summary": "No specific feedback found."}

      Issue and PR data:
      $fetch-issue.output

      Output ONLY valid JSON, nothing else:
      {"summary": "<2-3 sentence summary>"}
    allowed_tools: []
    model: haiku
    depends_on: [fetch-issue]
    when: "$parse-intent.output.intent == 'continue'"
    output_format:
      type: object
      properties:
        summary:
          type: string
      required: [summary]

  - id: acknowledge-continue
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      SUMMARY="$summarize-feedback.output.summary"
      echo "Acknowledging feedback for issue #${ISSUE}..."
      gh issue comment "$ISSUE" --body "Resuming work — Feedback understood: ${SUMMARY}"
      echo "Acknowledged feedback for issue #${ISSUE}"
    depends_on: [summarize-feedback]
    when: "$parse-intent.output.intent == 'continue'"
    timeout: 15000

  # Layer 1: Route based on intent
  - id: close-announce
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      echo "Closing issue #${ISSUE}: merging PR and tearing down preview..."
      gh issue comment "$ISSUE" --body "Merging PR and tearing down preview environment."
      echo "Announced close for issue #${ISSUE}"
    depends_on: [fetch-issue]
    when: "$parse-intent.output.intent == 'close'"
    timeout: 15000

  - id: close-preview
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      EPIC_NUM=$(echo $fetch-issue.output | jq -r '.epic_number // empty')

      echo "Tearing down mh-preview-${ISSUE}..."
      docker compose -p "mh-preview-${ISSUE}" down -v 2>/dev/null || echo "No preview stack found"

      # Find the PR (branch includes a slug suffix, so use search prefix match)
      PR_NUM=$(gh pr list --search "head:feat/issue-${ISSUE}-" --json number --jq '.[0].number // empty')
      if [ -z "$PR_NUM" ]; then
        echo "ERROR: No PR found for issue #$ISSUE"
        exit 1
      fi

      # Mark ready (factory creates PRs as drafts) then merge to main
      gh pr ready "$PR_NUM" 2>/dev/null || true
      if ! gh pr merge "$PR_NUM" --merge --delete-branch; then
        echo "ERROR: PR #$PR_NUM could not be merged (check approval status or conflicts)"
        exit 1
      fi
      echo "PR #$PR_NUM merged successfully"

      # Move the sub-issue to Done (never the epic — it stays In Progress)
      ITEM_ID=$(gh project item-list 1 --owner omniscient --format json --limit 200 \
        | jq -r ".items[] | select(.content.number == $ISSUE and .content.type == \"Issue\") | .id")
      if [ -n "$ITEM_ID" ]; then
        gh project item-edit \
          --project-id PVT_kwHOAAFds84BWh4w \
          --id "$ITEM_ID" \
          --field-id PVTSSF_lAHOAAFds84BWh4wzhR1VaA \
          --single-select-option-id 98236657
        echo "Moved issue #$ISSUE to Done"
      fi
      gh issue comment "$ISSUE" --body "Dark factory: preview torn down, PR #${PR_NUM} merged. Issue complete."
      echo "CLOSED"
    depends_on: [parse-intent, fetch-issue]
    when: "$parse-intent.output.intent == 'close'"
    timeout: 30000

  - id: setup-branch
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      INTENT=$parse-intent.output.intent
      SLUG=$(echo $fetch-issue.output | jq -r '.title // "feature"' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | head -c 40)
      BRANCH="feat/issue-${ISSUE}-${SLUG}"
      echo "Setting up branch for issue #${ISSUE}..."

      if [ "$INTENT" = "continue" ]; then
        git fetch origin "$BRANCH" 2>/dev/null && git checkout "$BRANCH" || git checkout -b "$BRANCH"
      else
        git checkout -b "$BRANCH"
      fi
      echo "$BRANCH"
    depends_on: [parse-intent, fetch-issue]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 15000

  # Refinement branch setup (refine/issue-N-slug)
  - id: setup-refine-branch
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      SLUG=$(echo $fetch-issue.output | jq -r '.title // "feature"' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | head -c 40)
      BRANCH="refine/issue-${ISSUE}-${SLUG}"

      EXISTING=$(git branch -r --list "origin/$BRANCH" 2>/dev/null)
      if [ -n "$EXISTING" ]; then
        git fetch origin "$BRANCH" && git checkout "$BRANCH"
      else
        git checkout -b "$BRANCH"
      fi
      echo "$BRANCH"
    depends_on: [parse-intent, fetch-issue]
    when: "$parse-intent.output.intent == 'refine' || $parse-intent.output.intent == 'plan'"
    timeout: 15000

  # Layer 2a: Refine — generate spec via multi-agent brainstorming
  - id: refine
    command: dark-factory-refine
    depends_on: [setup-refine-branch, fetch-issue]
    when: "$parse-intent.output.intent == 'refine'"
    idle_timeout: 600000

  # Layer 2b: Plan — generate implementation plan with architect review
  - id: plan
    command: dark-factory-plan
    depends_on: [setup-refine-branch, fetch-issue]
    when: "$parse-intent.output.intent == 'plan'"
    idle_timeout: 600000

  # Push refine branch after spec generation
  - id: refine-push
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      BRANCH=$(git branch --show-current)

      git push -u origin "$BRANCH"
      echo "Pushed $BRANCH for issue #$ISSUE"
    depends_on: [refine]
    when: "$parse-intent.output.intent == 'refine'"
    timeout: 30000

  # Push plan branch (no longer auto-advances to Ready — plan-pending-review gate)
  - id: plan-push-and-advance
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      BRANCH=$(git branch --show-current)

      git push -u origin "$BRANCH"
      echo "Pushed $BRANCH for issue #$ISSUE (plan-pending-review gate — not advancing to Ready)"
    depends_on: [plan]
    when: "$parse-intent.output.intent == 'plan'"
    timeout: 30000

  # Layer 2: Implement the feature (status set to "In Progress" by entrypoint or epic resolver)
  - id: implement
    command: dark-factory-implement
    depends_on: [setup-branch, fetch-issue]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    idle_timeout: 600000

  # Layer 3: Spin up preview and validate
  - id: preview-up
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      # Preview ports follow 1{SLOT}{suffix} (e.g. slot 03 -> frontend 10333, backend 10380).
      # Collision-free allocation: recover the slot from the already-running preview stack (Continue runs),
      # or scan docker ps for occupied 1PP33->3333 frontend ports and pick the lowest free 2-digit slot.
      PADDED=""
      EXISTING_PORT=$(docker ps \
        --filter "label=com.docker.compose.project=mh-preview-${ISSUE}" \
        --format '{{.Ports}}' 2>/dev/null \
        | grep -oP '(?<=:)1\d{4}(?=->3333)' | head -1 || true)
      if [ -n "$EXISTING_PORT" ]; then
        PADDED=$(printf "%02d" $(( (EXISTING_PORT - 10000) / 100 )))
        echo "INFO: Recovered slot ${PADDED} from existing preview for issue #${ISSUE}" >&2
      else
        USED_SLOTS=$(docker ps --format '{{.Ports}}' 2>/dev/null \
          | grep -oP '(?<=:)1\d{4}(?=->3333)' \
          | while read -r PORT; do printf "%02d\n" $(( (PORT - 10000) / 100 )); done \
          | sort -u || true)
        for i in $(seq 0 99); do
          SLOT=$(printf "%02d" $i)
          if ! echo "$USED_SLOTS" | grep -qx "$SLOT"; then
            PADDED="$SLOT"
            break
          fi
        done
        if [ -z "$PADDED" ]; then
          echo "ERROR: No free preview slot in range 00-99. Run 'Close issue #N' on a stale preview to free a slot." >&2
          exit 1
        fi
        echo "INFO: Allocated slot ${PADDED} for issue #${ISSUE}" >&2
      fi
      export ISSUE_NUM_PADDED="$PADDED"
      export POLYGON_API_KEY="${POLYGON_API_KEY:-}"

      PREVIEW_START=$(date +%s)
      echo "Starting preview stack mh-preview-${ISSUE} (ports: 1${PADDED}33, 1${PADDED}80)..."
      docker compose -p "mh-preview-${ISSUE}" \
        -f dark-factory/docker-compose.preview.yml \
        up -d --build

      echo "Checking database state..."
      TABLE_COUNT=$(docker compose -p "mh-preview-${ISSUE}" \
        -f dark-factory/docker-compose.preview.yml \
        exec -T postgres psql -U postgres -d stockscanner -tAc \
        "SELECT count(*) FROM information_schema.tables WHERE table_schema='public'" 2>/dev/null || echo "0")

      if [ "${TABLE_COUNT:-0}" -gt 0 ]; then
        echo "Existing DB detected (${TABLE_COUNT} tables) — skipping create_all and stamp head, running alembic upgrade head only..."
        docker compose -p "mh-preview-${ISSUE}" \
          -f dark-factory/docker-compose.preview.yml \
          exec -T backend python -m alembic upgrade head
      else
        echo "Fresh DB — running full bootstrap (create_all, stamp head, upgrade head)..."
        docker compose -p "mh-preview-${ISSUE}" \
          -f dark-factory/docker-compose.preview.yml \
          exec -T backend python -c 'from app.core.database import Base, engine; from app.models import *; Base.metadata.create_all(bind=engine); print("Tables created")'
        docker compose -p "mh-preview-${ISSUE}" \
          -f dark-factory/docker-compose.preview.yml \
          exec -T backend python -m alembic stamp head
        docker compose -p "mh-preview-${ISSUE}" \
          -f dark-factory/docker-compose.preview.yml \
          exec -T backend python -m alembic upgrade head
      fi

      PREVIEW_NET="mh-preview-${ISSUE}_preview-network"
      docker network connect "$PREVIEW_NET" "$(hostname)" 2>/dev/null || true

      echo "Waiting for backend health..."
      for i in $(seq 1 60); do
        if docker compose -p "mh-preview-${ISSUE}" -f dark-factory/docker-compose.preview.yml exec -T backend python -c 'import urllib.request; urllib.request.urlopen("http://localhost:8000/api/health")' 2>/dev/null; then
          PREVIEW_SECS=$(( $(date +%s) - PREVIEW_START ))
          echo "Backend healthy!"
          echo "PREVIEW_SLOT=${PADDED}"
          echo "PREVIEW_FRONTEND=http://localhost:1${PADDED}33"
          echo "PREVIEW_BACKEND=http://localhost:1${PADDED}80"
          echo "PREVIEW_MOUNT_SECS=${PREVIEW_SECS}"
          docker network disconnect "$PREVIEW_NET" "$(hostname)" 2>/dev/null || true
          exit 0
        fi
        sleep 3
      done
      echo "WARNING: Backend did not become healthy within 180s"
      docker network disconnect "$PREVIEW_NET" "$(hostname)" 2>/dev/null || true
      exit 1
    depends_on: [implement]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 300000

  - id: validate
    command: dark-factory-validate
    depends_on: [preview-up]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    idle_timeout: 300000

  # Layer 4: Push and create PR
  - id: push-and-pr
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      EPIC_NUM=$(echo $fetch-issue.output | jq -r '.epic_number // empty')
      PREVIEW_FRONTEND=$(echo $preview-up.output | grep '^PREVIEW_FRONTEND=' | cut -d= -f2-)
      PREVIEW_BACKEND=$(echo $preview-up.output | grep '^PREVIEW_BACKEND=' | cut -d= -f2-)
      BRANCH=$(git branch --show-current)
      echo "Pushing branch and creating/updating PR for issue #${ISSUE}..."

      # Fail loudly if the push is rejected (e.g. token missing 'workflow' scope for .github/workflows
      # changes). Previously the rejection was swallowed and a misleading success comment was posted.
      if ! git push -u origin "$BRANCH"; then
        echo "ERROR: git push failed for '$BRANCH' — aborting before PR creation." >&2
        exit 1
      fi

      # Confirm the branch actually landed on origin; gh pr create cannot work otherwise.
      if ! git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
        echo "ERROR: branch '$BRANCH' is not on origin after push — aborting." >&2
        exit 1
      fi

      EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
      if [ -n "$EXISTING_PR" ]; then
        echo "PR #${EXISTING_PR} already exists, updated with latest push."
        echo "$EXISTING_PR"
      else
        EPIC_LINE=""
        if [ -n "$EPIC_NUM" ]; then
          EPIC_LINE="
      **Epic:** #${EPIC_NUM}"
        fi
        PR_URL=$(gh pr create \
          --title "$(gh issue view $ISSUE --json title --jq '.title')" \
          --body "## Summary
      Automated implementation for issue #${ISSUE}.${EPIC_LINE}

      ## Preview
      - Frontend: ${PREVIEW_FRONTEND}
      - Backend API: ${PREVIEW_BACKEND}/docs

      ## Commands
      \`\`\`bash
      # Iterate after feedback
      docker compose --profile factory run --rm dark-factory \"Continue issue #${ISSUE}\"

      # Tear down preview when done
      docker compose --profile factory run --rm dark-factory \"Close issue #${ISSUE}\"
      \`\`\`

      ---
      *Generated by MarketHawk Dark Factory*" \
          --draft)
        # gh pr create prints the PR URL on success; empty output means creation failed.
        if [ -z "$PR_URL" ]; then
          echo "ERROR: gh pr create produced no URL — PR was not created." >&2
          exit 1
        fi
        echo "Created PR: $PR_URL"
      fi
    depends_on: [validate]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 30000

  # Layer 5: Move to "In review" and post report
  - id: status-in-review
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      echo "Moving issue #${ISSUE} to In Review..."
      ITEM_ID=$(gh project item-list 1 --owner omniscient --format json --limit 200 \
        | jq -r ".items[] | select(.content.number == $ISSUE and .content.type == \"Issue\") | .id")
      if [ -n "$ITEM_ID" ]; then
        gh project item-edit \
          --project-id PVT_kwHOAAFds84BWh4w \
          --id "$ITEM_ID" \
          --field-id PVTSSF_lAHOAAFds84BWh4wzhR1VaA \
          --single-select-option-id df73e18b
        echo "Moved issue #$ISSUE to In Review"
      else
        echo "WARNING: Issue #$ISSUE not found on project board"
      fi
    depends_on: [push-and-pr]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 15000

  - id: report
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      EPIC_NUM=$(echo $fetch-issue.output | jq -r '.epic_number // empty')
      PREVIEW_SLOT=$(echo $preview-up.output | grep '^PREVIEW_SLOT=' | cut -d= -f2-)
      PREVIEW_FRONTEND=$(echo $preview-up.output | grep '^PREVIEW_FRONTEND=' | cut -d= -f2-)
      PREVIEW_BACKEND=$(echo $preview-up.output | grep '^PREVIEW_BACKEND=' | cut -d= -f2-)
      INTENT=$parse-intent.output.intent
      BRANCH=$(git branch --show-current)
      echo "Posting summary to issue #${ISSUE}..."

      PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
      PR_LINE=""
      [ -n "$PR_NUM" ] && PR_LINE="**PR:** #${PR_NUM}"

      EPIC_LINE=""
      [ -n "$EPIC_NUM" ] && EPIC_LINE="**Epic:** #${EPIC_NUM}"

      ACTION="New implementation"
      [ "$INTENT" = "continue" ] && ACTION="Continued iteration"

      CHANGES=""
      if [ -f "$ARTIFACTS_DIR/implementation.md" ]; then
        CHANGES=$(cat "$ARTIFACTS_DIR/implementation.md")
      fi

      gh issue comment "$ISSUE" --body "## Dark Factory Run — ${ACTION}

      ${PR_LINE}
      ${EPIC_LINE}
      **Branch:** \`${BRANCH}\`

      ### Changes

      ${CHANGES:-_No implementation summary available._}

      ### Preview Environment

      | Service | URL |
      |---------|-----|
      | Frontend | ${PREVIEW_FRONTEND} |
      | Backend API | ${PREVIEW_BACKEND} |
      | API Docs | ${PREVIEW_BACKEND}/docs |
      | PostgreSQL | \`localhost:1${PREVIEW_SLOT}54\` |
      | Redis | \`localhost:1${PREVIEW_SLOT}63\` |

      ### Commands
      \`\`\`bash
      # Iterate after review
      docker compose --profile factory run --rm dark-factory \"Continue issue #${ISSUE}\"

      # Tear down when done
      docker compose --profile factory run --rm dark-factory \"Close issue #${ISSUE}\"
      \`\`\`

      ---
      *Posted by MarketHawk Dark Factory*"

      echo "Report posted to issue #${ISSUE}"
    depends_on: [status-in-review]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 15000
