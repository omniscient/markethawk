name: archon-dark-factory
description: |
  Use when: Running inside the dark-factory Docker container to implement a GitHub issue.
  Triggers: "Fix issue", "Continue issue", "Close issue", "Refine issue", "Plan issue".
  Does: Parses intent -> fetches issue context -> branches -> implements/refines/plans ->
        spins up preview stack (implement only) -> validates -> pushes and creates PR/spec/plan.
  NOT for: Running outside the dark-factory container.

provider: claude
model: sonnet

worktree:
  enabled: false

nodes:
  # Layer 0: Parse the command and fetch issue context
  - id: parse-intent
    prompt: |
      Parse this command and extract two things:
      1. The GitHub issue number
      2. The intent: "new" (first time working on this issue), "continue" (iterate on existing work), "close" (merge and tear down), "refine" (generate a design spec), or "plan" (generate an implementation plan)

      Command: $ARGUMENTS

      Output ONLY valid JSON, nothing else:
      {"issue_number": <int>, "intent": "<new|continue|close|refine|plan>"}
    allowed_tools: []
    model: haiku
    output_format:
      type: object
      properties:
        issue_number:
          type: integer
        intent:
          type: string
          enum: [new, continue, close, refine, plan]
      required: [issue_number, intent]

  - id: fetch-issue
    bash: |
      N=$parse-intent.output.issue_number
      INTENT=$parse-intent.output.intent
      EPIC_N=""
      ISSUE_DATA=$(gh issue view "$N" --json title,body,labels,comments)

      # --- Epic resolution: never implement an epic monolithically ---
      IS_EPIC=$(echo "$ISSUE_DATA" | jq -r 'if [.labels[].name] | index("epic") then "yes" else "no" end')

      if [ "$IS_EPIC" = "yes" ]; then
        echo "Issue #$N is an epic â€” resolving to next sub-issue..." >&2
        BODY=$(echo "$ISSUE_DATA" | jq -r '.body // ""')
        SUB_ISSUES=$(echo "$BODY" | grep -oP '\- \[ \] #\K\d+' || true)

        if [ -z "$SUB_ISSUES" ]; then
          echo "ERROR: Epic #$N has no unchecked sub-issues (expected '- [ ] #NN' entries)" >&2
          exit 1
        fi

        RESOLVED=""
        for SUB in $SUB_ISSUES; do
          STATE=$(gh issue view "$SUB" --json state --jq '.state')
          if [ "$STATE" != "OPEN" ]; then
            echo "  #$SUB â€” closed, skipping" >&2
            continue
          fi
          HAS_PR=$(gh pr list --search "head:feat/issue-${SUB}-" --json number --jq '.[0].number // empty')
          if ([ "$INTENT" = "continue" ] || [ "$INTENT" = "close" ]) && [ -n "$HAS_PR" ]; then
            echo "  #$SUB â€” has open PR, picking for $INTENT" >&2
            RESOLVED="$SUB"
            break
          elif [ "$INTENT" != "continue" ] && [ "$INTENT" != "close" ] && [ -z "$HAS_PR" ]; then
            echo "  #$SUB â€” open and no PR, starting this one" >&2
            RESOLVED="$SUB"
            break
          else
            echo "  #$SUB â€” skipping (intent=$INTENT, has_pr=${HAS_PR:-none})" >&2
          fi
        done

        # Fallback for continue/close: if no sub-issue has a PR, pick first open one
        if [ -z "$RESOLVED" ] && ([ "$INTENT" = "continue" ] || [ "$INTENT" = "close" ]); then
          for SUB in $SUB_ISSUES; do
            STATE=$(gh issue view "$SUB" --json state --jq '.state')
            if [ "$STATE" = "OPEN" ]; then
              echo "  Fallback: picking first open sub-issue #$SUB" >&2
              RESOLVED="$SUB"
              break
            fi
          done
        fi

        if [ -z "$RESOLVED" ]; then
          echo "ERROR: All sub-issues in epic #$N are closed or already have PRs" >&2
          exit 1
        fi

        echo "Resolved epic #$N â†’ sub-issue #$RESOLVED" >&2
        EPIC_N="$N"
        N="$RESOLVED"
        ISSUE_DATA=$(gh issue view "$N" --json title,body,labels,comments)
      fi

      # --- Fetch PR review comments if a PR exists for this issue ---
      PR_NUM=$(gh pr list --search "head:feat/issue-${N}-" --json number --jq '.[0].number // empty')
      if [ -n "$PR_NUM" ]; then
        PR_COMMENTS=$(gh pr view "$PR_NUM" --json reviews,comments,reviewRequests)
        INLINE_COMMENTS=$(gh api "repos/omniscient/markethawk/pulls/$PR_NUM/comments" \
          --jq '[.[] | {path: .path, line: .line, body: .body, created_at: .created_at}]' 2>/dev/null || echo '[]')
        ISSUE_DATA=$(echo "$ISSUE_DATA" \
          | jq --argjson pr "$PR_COMMENTS" --argjson inline "$INLINE_COMMENTS" \
            '. + {pr_reviews: $pr, pr_inline_comments: $inline}')
      fi
      echo "$ISSUE_DATA" | jq \
        --arg intent "$INTENT" \
        --argjson resolved "$N" \
        --arg epic "${EPIC_N:-null}" \
        '. + {intent: $intent, resolved_number: $resolved, epic_number: (if $epic == "null" then null else ($epic | tonumber) end)}'
    depends_on: [parse-intent]
    timeout: 60000

  # Layer 0.5: Acknowledge feedback (continue flow only)
  - id: summarize-feedback
    prompt: |
      You are reviewing feedback on a code implementation. Below is the issue and PR data.
      Focus only on human-authored feedback â€” ignore any comments from "Dark Factory" or other bots.
      Summarize the feedback in 2-3 sentences covering what changes the reviewer wants made.
      If there is no meaningful human feedback, respond with: {"summary": "No specific feedback found."}

      Issue and PR data:
      $fetch-issue.output

      Output ONLY valid JSON, nothing else:
      {"summary": "<2-3 sentence summary>"}
    allowed_tools: []
    model: haiku
    depends_on: [fetch-issue]
    when: "$parse-intent.output.intent == 'continue'"
    output_format:
      type: object
      properties:
        summary:
          type: string
      required: [summary]

  - id: acknowledge-continue
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      SUMMARY="$summarize-feedback.output.summary"
      echo "Acknowledging feedback for issue #${ISSUE}..."
      gh issue comment "$ISSUE" --body "Resuming work â€” Feedback understood: ${SUMMARY}"
      echo "Acknowledged feedback for issue #${ISSUE}"
    depends_on: [summarize-feedback]
    when: "$parse-intent.output.intent == 'continue'"
    timeout: 15000

  # Layer 1: Route based on intent
  - id: close-announce
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      echo "Closing issue #${ISSUE}: merging PR and tearing down preview..."
      gh issue comment "$ISSUE" --body "Merging PR and tearing down preview environment."
      echo "Announced close for issue #${ISSUE}"
    depends_on: [fetch-issue]
    when: "$parse-intent.output.intent == 'close'"
    timeout: 15000

  - id: close-preview
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      EPIC_NUM=$(echo $fetch-issue.output | jq -r '.epic_number // empty')

      echo "Tearing down mh-preview-${ISSUE}..."
      docker compose -p "mh-preview-${ISSUE}" down -v 2>/dev/null || echo "No preview stack found"

      # Find the PR (branch includes a slug suffix, so use search prefix match)
      PR_NUM=$(gh pr list --search "head:feat/issue-${ISSUE}-" --json number --jq '.[0].number // empty')
      if [ -z "$PR_NUM" ]; then
        echo "ERROR: No PR found for issue #$ISSUE"
        exit 1
      fi

      # Mark ready (factory creates PRs as drafts) then merge to main
      gh pr ready "$PR_NUM" 2>/dev/null || true
      if ! gh pr merge "$PR_NUM" --merge --delete-branch; then
        echo "ERROR: PR #$PR_NUM could not be merged (check approval status or conflicts)"
        exit 1
      fi
      echo "PR #$PR_NUM merged successfully"

      # Move the sub-issue to Done (never the epic â€” it stays In Progress)
      ITEM_ID=$(gh project item-list 1 --owner omniscient --format json --limit 200 \
        | jq -r ".items[] | select(.content.number == $ISSUE and .content.type == \"Issue\") | .id")
      if [ -n "$ITEM_ID" ]; then
        gh project item-edit \
          --project-id PVT_kwHOAAFds84BWh4w \
          --id "$ITEM_ID" \
          --field-id PVTSSF_lAHOAAFds84BWh4wzhR1VaA \
          --single-select-option-id 98236657
        echo "Moved issue #$ISSUE to Done"
      fi
      gh issue comment "$ISSUE" --body "Dark factory: preview torn down, PR #${PR_NUM} merged. Issue complete."
      echo "CLOSED"
    depends_on: [parse-intent, fetch-issue]
    when: "$parse-intent.output.intent == 'close'"
    timeout: 30000

  - id: setup-branch
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      INTENT=$parse-intent.output.intent
      SLUG=$(echo $fetch-issue.output | jq -r '.title // "feature"' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | head -c 40)
      BRANCH="feat/issue-${ISSUE}-${SLUG}"
      echo "Setting up branch for issue #${ISSUE}..."

      if [ "$INTENT" = "continue" ]; then
        git fetch origin "$BRANCH" 2>/dev/null && git checkout "$BRANCH" || git checkout -b "$BRANCH"
      else
        git checkout -b "$BRANCH"
      fi
      echo "$BRANCH"
    depends_on: [parse-intent, fetch-issue]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 15000

  # Refinement branch setup (refine/issue-N-slug)
  - id: setup-refine-branch
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      SLUG=$(echo $fetch-issue.output | jq -r '.title // "feature"' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | head -c 40)
      BRANCH="refine/issue-${ISSUE}-${SLUG}"

      EXISTING=$(git branch -r --list "origin/$BRANCH" 2>/dev/null)
      if [ -n "$EXISTING" ]; then
        git fetch origin "$BRANCH" && git checkout "$BRANCH"
      else
        git checkout -b "$BRANCH"
      fi
      echo "$BRANCH"
    depends_on: [parse-intent, fetch-issue]
    when: "$parse-intent.output.intent == 'refine' || $parse-intent.output.intent == 'plan'"
    timeout: 15000

  # Layer 2a: Refine â€” generate spec via multi-agent brainstorming
  - id: refine
    command: dark-factory-refine
    depends_on: [setup-refine-branch, fetch-issue]
    when: "$parse-intent.output.intent == 'refine'"
    idle_timeout: 600000

  # Layer 2b: Plan â€” generate implementation plan with architect review
  - id: plan
    command: dark-factory-plan
    depends_on: [setup-refine-branch, fetch-issue]
    when: "$parse-intent.output.intent == 'plan'"
    idle_timeout: 600000

  # Push refine branch after spec generation
  - id: refine-push
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      BRANCH=$(git branch --show-current)

      git push -u origin "$BRANCH"
      echo "Pushed $BRANCH for issue #$ISSUE"
    depends_on: [refine]
    when: "$parse-intent.output.intent == 'refine'"
    timeout: 30000

  # Push plan branch (no longer auto-advances to Ready â€” plan-pending-review gate)
  - id: plan-push-and-advance
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      BRANCH=$(git branch --show-current)

      git push -u origin "$BRANCH"
      echo "Pushed $BRANCH for issue #$ISSUE (plan-pending-review gate â€” not advancing to Ready)"
    depends_on: [plan]
    when: "$parse-intent.output.intent == 'plan'"
    timeout: 30000

  # Startup codeindex regeneration â€” runs before implement so the MCP tools serve a fresh index
  - id: update-codeindex
    bash: |
      if ! command -v codeindex &>/dev/null; then
        echo "WARNING: codeindex not available â€” skipping index regeneration"
        exit 0
      fi
      echo "Regenerating codeindex (startup pass)..."
      codeindex analyze . 2>/dev/null && echo "analyze: OK" || echo "WARNING: codeindex analyze failed"
      codeindex symbols . --inline 2>/dev/null && echo "symbols: OK" || echo "WARNING: codeindex symbols failed"
      echo "codeindex startup pass complete"
    depends_on: [setup-branch]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 120000

  # Layer 2: Implement the feature (status set to "In Progress" by entrypoint or epic resolver)
  - id: implement
    command: dark-factory-implement
    depends_on: [update-codeindex, fetch-issue]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    idle_timeout: 600000

  # Post-implement codeindex regeneration â€” commits codeindex.json / symbolindex.json / hotspots so the
  # artifact in the PR matches the final code.  Non-fatal: if codeindex is unavailable the run continues.
  - id: regen-codeindex
    bash: |
      if ! command -v codeindex &>/dev/null; then
        echo "WARNING: codeindex not available â€” skipping post-implement regeneration"
        exit 0
      fi
      echo "Regenerating codeindex (post-implement pass)..."
      codeindex analyze . 2>/dev/null || echo "WARNING: codeindex analyze failed"
      codeindex symbols . --inline 2>/dev/null || echo "WARNING: codeindex symbols failed"
      mkdir -p docs
      codeindex high-blast 2>/dev/null > docs/codeindex-hotspots.md || true
      git add codeindex.json symbolindex.json docs/codeindex-hotspots.md 2>/dev/null || true
      if ! git diff --staged --quiet 2>/dev/null; then
        git commit -m "chore: update codeindex artifacts (post-implement)"
        echo "codeindex artifacts committed"
      else
        echo "codeindex artifacts unchanged â€” no commit needed"
      fi
    depends_on: [implement]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 120000

  # Layer 2.5: Classify whether a preview environment is needed
  - id: preview-changeset
    bash: |
      echo "=== Changed files (main...HEAD) ==="
      git diff main...HEAD --name-only 2>/dev/null || true
      echo "=== Stat ==="
      git diff main...HEAD --stat 2>/dev/null || true
    depends_on: [regen-codeindex, fetch-issue]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 15000

  - id: classify-preview
    prompt: |
      You are a classifier deciding whether a dark-factory preview stack (postgres, redis, backend,
      frontend, celery) is needed for this branch's changeset. A wasted preview costs minutes; a
      wrongly skipped preview means a code change ships without live endpoint validation.

      ## Config kill-switch
      Read the preview.enabled flag from .claude/skills/refinement/config.yaml.
      If preview.enabled is false, ALWAYS output needs_preview=true regardless of the changeset.

      ## Changeset
      $preview-changeset.output

      ## Issue context (secondary signal only â€” the diff is authoritative)
      Title: $fetch-issue.output.title
      Labels: $fetch-issue.output.labels

      ## Classifier rubric

      Set needs_preview = false ONLY if EVERY changed file falls into one or more of these
      non-runtime-affecting categories:

      | Category        | Matches |
      |-----------------|---------|
      | Documentation   | *.md, *.mdx, anything under docs/ or Docs/, LICENSE |
      | Agent/workflow config | .archon/**, .claude/**, workflow YAML (NOT docker-compose* or app config) |
      | Tests           | backend/tests/**, **/*.test.ts(x), **/*.spec.ts(x), conftest.py, **/*_test.py, dark-factory/tests/** |
      | CI / repo meta  | .github/**, .gitignore, .pre-commit-config.yaml, lint/format config (.eslintrc*, .prettierrc*, ruff/flake8/mypy config), .editorconfig |

      Force needs_preview = true if ANY file touches the running app: backend/app/**, alembic/versions/**,
      requirements.txt, frontend/src/**, package.json, package-lock.json, Dockerfile*, docker-compose*,
      .env*, dark-factory/seed/**.

      Fail-safe: an empty changeset, a mix that is not clearly skip-only, or any uncertainty â†’ needs_preview=true.
      The diff is authoritative â€” a documentation-labeled issue that touches backend/app/** still gets a preview.
    allowed_tools: [Read]
    model: haiku
    depends_on: [preview-changeset, fetch-issue]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    output_format:
      type: object
      properties:
        needs_preview:
          type: boolean
        category:
          type: string
          enum: [code, docs, config, tests, ci, mixed]
        reason:
          type: string
      required: [needs_preview, category, reason]

  # Layer 3: Spin up preview and validate
  - id: preview-up
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      NEEDS_PREVIEW=$classify-preview.output.needs_preview
      SKIP_REASON="$classify-preview.output.reason"

      # Skip ONLY on an explicit "false". Any other value (including garbled or errored
      # classifier output) falls through to building the preview â€” fail-safe direction.
      if [ "$NEEDS_PREVIEW" = "false" ]; then
        echo "Preview differentiator: skipping preview for issue #${ISSUE}"
        echo "Reason: ${SKIP_REASON}"
        mkdir -p "$ARTIFACTS_DIR"
        {
          echo "export PREVIEW_SKIPPED=true"
          echo "export PREVIEW_SKIP_REASON=\"${SKIP_REASON}\""
          echo "export PREVIEW_FRONTEND=\"\""
          echo "export PREVIEW_BACKEND=\"\""
          echo "export PREVIEW_NET=\"\""
        } > "$ARTIFACTS_DIR/preview_env.sh"
        echo "PREVIEW_SKIPPED=true"
        echo "PREVIEW_SKIP_REASON=${SKIP_REASON}"
        exit 0
      fi

      # Preview ports follow 1{SLOT}{suffix} (e.g. slot 03 -> frontend 10333, backend 10380).
      # Collision-free allocation: recover the slot from the already-running preview stack (Continue runs),
      # or scan docker ps for occupied 1PP33->3333 frontend ports and pick the lowest free 2-digit slot.
      PADDED=""
      EXISTING_PORT=$(docker ps \
        --filter "label=com.docker.compose.project=mh-preview-${ISSUE}" \
        --format '{{.Ports}}' 2>/dev/null \
        | grep -oP '(?<=:)1\d{4}(?=->3333)' | head -1 || true)
      if [ -n "$EXISTING_PORT" ]; then
        PADDED=$(printf "%02d" $(( (EXISTING_PORT - 10000) / 100 )))
        echo "INFO: Recovered slot ${PADDED} from existing preview for issue #${ISSUE}" >&2
      else
        USED_SLOTS=$(docker ps --format '{{.Ports}}' 2>/dev/null \
          | grep -oP '(?<=:)1\d{4}(?=->3333)' \
          | while read -r PORT; do printf "%02d\n" $(( (PORT - 10000) / 100 )); done \
          | sort -u || true)
        for i in $(seq 0 99); do
          SLOT=$(printf "%02d" $i)
          if ! echo "$USED_SLOTS" | grep -qx "$SLOT"; then
            PADDED="$SLOT"
            break
          fi
        done
        if [ -z "$PADDED" ]; then
          echo "ERROR: No free preview slot in range 00-99. Run 'Close issue #N' on a stale preview to free a slot." >&2
          exit 1
        fi
        echo "INFO: Allocated slot ${PADDED} for issue #${ISSUE}" >&2
      fi
      export ISSUE_NUM_PADDED="$PADDED"
      export POLYGON_API_KEY="${POLYGON_API_KEY:-}"

      PREVIEW_START=$(date +%s)
      echo "Starting preview stack mh-preview-${ISSUE} (ports: 1${PADDED}33, 1${PADDED}80)..."
      docker compose -p "mh-preview-${ISSUE}" \
        -f dark-factory/docker-compose.preview.yml \
        up -d --build

      echo "Checking database state..."
      TABLE_COUNT=$(docker compose -p "mh-preview-${ISSUE}" \
        -f dark-factory/docker-compose.preview.yml \
        exec -T postgres psql -U postgres -d stockscanner -tAc \
        "SELECT count(*) FROM information_schema.tables WHERE table_schema='public'" 2>/dev/null || echo "0")

      if [ "${TABLE_COUNT:-0}" -gt 0 ]; then
        echo "Existing DB detected (${TABLE_COUNT} tables) â€” skipping create_all and stamp head, running alembic upgrade head only..."
        docker compose -p "mh-preview-${ISSUE}" \
          -f dark-factory/docker-compose.preview.yml \
          exec -T backend python -m alembic upgrade head
      else
        echo "Fresh DB â€” running full bootstrap (create_all, stamp head, upgrade head)..."
        docker compose -p "mh-preview-${ISSUE}" \
          -f dark-factory/docker-compose.preview.yml \
          exec -T backend python -c 'from app.core.database import Base, engine; from app.models import *; Base.metadata.create_all(bind=engine); print("Tables created")'
        docker compose -p "mh-preview-${ISSUE}" \
          -f dark-factory/docker-compose.preview.yml \
          exec -T backend python -m alembic stamp head
        docker compose -p "mh-preview-${ISSUE}" \
          -f dark-factory/docker-compose.preview.yml \
          exec -T backend python -m alembic upgrade head
      fi

      PREVIEW_NET="mh-preview-${ISSUE}_preview-network"
      # Connect to the preview network so we can reach the backend by container hostname.
      # We stay connected for the lifetime of this job â€” the validate command step that
      # follows needs direct network access to run endpoint smoke tests.  Disconnect
      # happens in the validate step's cleanup (or on container exit).
      docker network connect "$PREVIEW_NET" "$(hostname)" 2>/dev/null || true

      # Backend is reachable inside the preview network via its container hostname.
      # Using the container hostname avoids the localhost:<hostPort> approach, which
      # does not work when the dark-factory container and the preview containers are on
      # different Docker networks (the host port IS reachable from the Docker host but
      # NOT from inside another container).
      BACKEND_HOSTNAME="mh-preview-${ISSUE}-backend-1"
      BACKEND_INTERNAL="http://${BACKEND_HOSTNAME}:8000"

      echo "Waiting for backend health..."
      for i in $(seq 1 60); do
        if docker compose -p "mh-preview-${ISSUE}" -f dark-factory/docker-compose.preview.yml exec -T backend python -c 'import urllib.request; urllib.request.urlopen("http://localhost:8000/api/health")' 2>/dev/null; then
          PREVIEW_SECS=$(( $(date +%s) - PREVIEW_START ))
          echo "Backend healthy!"
          echo "PREVIEW_SLOT=${PADDED}"
          echo "PREVIEW_FRONTEND=http://localhost:1${PADDED}33"
          echo "PREVIEW_BACKEND=${BACKEND_INTERNAL}"
          echo "PREVIEW_MOUNT_SECS=${PREVIEW_SECS}"
          # Write env file so the validate command can source it reliably without
          # having to parse raw step output or guess the URL.
          mkdir -p "$ARTIFACTS_DIR"
          {
            echo "export PREVIEW_SKIPPED=false"
            echo "export PREVIEW_FRONTEND=\"http://localhost:1${PADDED}33\""
            echo "export PREVIEW_BACKEND=\"${BACKEND_INTERNAL}\""
            echo "export PREVIEW_NET=\"${PREVIEW_NET}\""
          } > "$ARTIFACTS_DIR/preview_env.sh"
          exit 0
        fi
        sleep 3
      done
      echo "WARNING: Backend did not become healthy within 180s"
      docker network disconnect "$PREVIEW_NET" "$(hostname)" 2>/dev/null || true
      exit 1
    depends_on: [classify-preview]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 300000

  - id: validate
    command: dark-factory-validate
    depends_on: [preview-up]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    idle_timeout: 300000

  # Layer 3.5: Verify implementation conforms to spec (Gate 2 â€” code vs spec)
  - id: conformance
    command: dark-factory-conformance
    depends_on: [validate]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    idle_timeout: 600000

  # Layer 4: Push and create PR
  - id: push-and-pr
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      EPIC_NUM=$(echo $fetch-issue.output | jq -r '.epic_number // empty')
      PREVIEW_SKIPPED=$(echo $preview-up.output | grep '^PREVIEW_SKIPPED=' | cut -d= -f2-)
      PREVIEW_SKIP_REASON=$(echo $preview-up.output | grep '^PREVIEW_SKIP_REASON=' | cut -d= -f2-)
      PREVIEW_FRONTEND=$(echo $preview-up.output | grep '^PREVIEW_FRONTEND=' | cut -d= -f2-)
      PREVIEW_BACKEND=$(echo $preview-up.output | grep '^PREVIEW_BACKEND=' | cut -d= -f2-)
      BRANCH=$(git branch --show-current)
      echo "Pushing branch and creating/updating PR for issue #${ISSUE}..."

      # Archive spec/plan for this issue before pushing
      SPEC_FILE=$(grep -rl "#${ISSUE}" docs/superpowers/specs/ 2>/dev/null | head -1)
      PLAN_FILE=$(grep -rl "#${ISSUE}" docs/superpowers/plans/ 2>/dev/null | head -1)

      ARCHIVED=0
      if [ -n "$SPEC_FILE" ]; then
        mkdir -p docs/archive
        git mv "$SPEC_FILE" docs/archive/
        ARCHIVED=$((ARCHIVED + 1))
        echo "Archived spec: $SPEC_FILE -> docs/archive/"
      fi
      if [ -n "$PLAN_FILE" ]; then
        mkdir -p docs/archive
        git mv "$PLAN_FILE" docs/archive/
        ARCHIVED=$((ARCHIVED + 1))
        echo "Archived plan: $PLAN_FILE -> docs/archive/"
      fi

      if [ "$ARCHIVED" -gt 0 ]; then
        git commit -m "docs: archive spec/plan for issue #${ISSUE}"
      fi

      # Fail loudly if the push is rejected (e.g. token missing 'workflow' scope for .github/workflows
      # changes). Previously the rejection was swallowed and a misleading success comment was posted.
      if ! git push -u origin "$BRANCH"; then
        echo "ERROR: git push failed for '$BRANCH' â€” aborting before PR creation." >&2
        exit 1
      fi

      # Confirm the branch actually landed on origin; gh pr create cannot work otherwise.
      if ! git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
        echo "ERROR: branch '$BRANCH' is not on origin after push â€” aborting." >&2
        exit 1
      fi

      # --- Blast radius report (codeindex advisory) ---
      BLAST_SECTION=""
      if command -v codeindex &>/dev/null; then
        CHANGED_FILES=$(git diff main...HEAD --name-only 2>/dev/null | head -50 || true)
        if [ -n "$CHANGED_FILES" ]; then
          BLAST_OUTPUT=$(echo "$CHANGED_FILES" | xargs codeindex impact 2>/dev/null || true)
          if [ -n "$BLAST_OUTPUT" ]; then
            BLAST_SECTION=$(printf "\n\n## Blast radius\n\n\`\`\`\n%s\n\`\`\`" "$BLAST_OUTPUT")
          fi
        fi
      fi

      # --- Build the Preview section ---
      if [ "$PREVIEW_SKIPPED" = "true" ]; then
        PREVIEW_SECTION="_No preview environment â€” this change does not affect the running app (${PREVIEW_SKIP_REASON})._"
      else
        PREVIEW_SECTION="- Frontend: ${PREVIEW_FRONTEND}
      - Backend API: ${PREVIEW_BACKEND}/docs"
      fi

      EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
      if [ -n "$EXISTING_PR" ]; then
        echo "PR #${EXISTING_PR} already exists, updated with latest push."
        echo "$EXISTING_PR"
      else
        EPIC_LINE=""
        if [ -n "$EPIC_NUM" ]; then
          EPIC_LINE="
      **Epic:** #${EPIC_NUM}"
        fi
        PR_URL=$(gh pr create \
          --title "$(gh issue view $ISSUE --json title --jq '.title')" \
          --body "## Summary
      Automated implementation for issue #${ISSUE}.${EPIC_LINE}

      ## Preview
      ${PREVIEW_SECTION}

      ## Commands
      \`\`\`bash
      # Iterate after feedback
      docker compose --profile factory run --rm dark-factory \"Continue issue #${ISSUE}\"

      # Tear down preview when done
      docker compose --profile factory run --rm dark-factory \"Close issue #${ISSUE}\"
      \`\`\`
      ${BLAST_SECTION}
      ---
      *Generated by MarketHawk Dark Factory*" \
          --draft)
        # gh pr create prints the PR URL on success; empty output means creation failed.
        if [ -z "$PR_URL" ]; then
          echo "ERROR: gh pr create produced no URL â€” PR was not created." >&2
          exit 1
        fi
        echo "Created PR: $PR_URL"
      fi
    depends_on: [conformance]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 30000

  # Layer 5: Move to "In review" and post report
  - id: status-in-review
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      echo "Moving issue #${ISSUE} to In Review..."
      ITEM_ID=$(gh project item-list 1 --owner omniscient --format json --limit 200 \
        | jq -r ".items[] | select(.content.number == $ISSUE and .content.type == \"Issue\") | .id")
      if [ -n "$ITEM_ID" ]; then
        gh project item-edit \
          --project-id PVT_kwHOAAFds84BWh4w \
          --id "$ITEM_ID" \
          --field-id PVTSSF_lAHOAAFds84BWh4wzhR1VaA \
          --single-select-option-id df73e18b
        echo "Moved issue #$ISSUE to In Review"
      else
        echo "WARNING: Issue #$ISSUE not found on project board"
      fi
    depends_on: [push-and-pr]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 15000

  - id: report
    bash: |
      ISSUE=$(echo $fetch-issue.output | jq -r '.resolved_number')
      EPIC_NUM=$(echo $fetch-issue.output | jq -r '.epic_number // empty')
      PREVIEW_SKIPPED=$(echo $preview-up.output | grep '^PREVIEW_SKIPPED=' | cut -d= -f2-)
      PREVIEW_SKIP_REASON=$(echo $preview-up.output | grep '^PREVIEW_SKIP_REASON=' | cut -d= -f2-)
      PREVIEW_SLOT=$(echo $preview-up.output | grep '^PREVIEW_SLOT=' | cut -d= -f2-)
      PREVIEW_FRONTEND=$(echo $preview-up.output | grep '^PREVIEW_FRONTEND=' | cut -d= -f2-)
      PREVIEW_BACKEND=$(echo $preview-up.output | grep '^PREVIEW_BACKEND=' | cut -d= -f2-)
      INTENT=$parse-intent.output.intent
      BRANCH=$(git branch --show-current)
      echo "Posting summary to issue #${ISSUE}..."

      PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
      PR_LINE=""
      [ -n "$PR_NUM" ] && PR_LINE="**PR:** #${PR_NUM}"

      EPIC_LINE=""
      [ -n "$EPIC_NUM" ] && EPIC_LINE="**Epic:** #${EPIC_NUM}"

      ACTION="New implementation"
      [ "$INTENT" = "continue" ] && ACTION="Continued iteration"

      CHANGES=""
      if [ -f "$ARTIFACTS_DIR/implementation.md" ]; then
        CHANGES=$(cat "$ARTIFACTS_DIR/implementation.md")
      fi

      CONFORMANCE_SECTION=""
      if [ -f "$ARTIFACTS_DIR/conformance.md" ]; then
        CONFORMANCE_STATUS=$(grep '^STATUS:' "$ARTIFACTS_DIR/conformance.md" | cut -d' ' -f2)
        case "$CONFORMANCE_STATUS" in
          PASS)
            CONFORMANCE_VERDICT=$(grep '^VERDICT:' "$ARTIFACTS_DIR/conformance.md" | cut -d' ' -f2)
            CONFORMANCE_CYCLES=$(grep '^CYCLES:' "$ARTIFACTS_DIR/conformance.md" | cut -d' ' -f2)
            NO_SPEC=$(grep '^NO_SPEC:' "$ARTIFACTS_DIR/conformance.md" | cut -d' ' -f2)
            ATTESTATION=$(sed -n '/^---$/,$ p' "$ARTIFACTS_DIR/conformance.md" | tail -n +2)
            CONFORMANCE_SECTION=$(printf "### Spec Conformance\n\n%s" "${ATTESTATION}")
            if [ "${NO_SPEC}" = "true" ]; then
              CONFORMANCE_SECTION=$(printf "%s\n\n_Advisory-only: no spec found; reviewed against issue body._" "${CONFORMANCE_SECTION}")
            fi
            ;;
          SKIPPED)
            CONFORMANCE_SECTION=$(printf "### Spec Conformance\n\n_Conformance check disabled (conformance.enabled=false)._")
            ;;
          *)
            CONFORMANCE_SECTION=""
            ;;
        esac
      fi

      # --- Build the Preview Environment section ---
      if [ "$PREVIEW_SKIPPED" = "true" ]; then
        PREVIEW_SECTION="_No preview environment â€” this change does not affect the running app (${PREVIEW_SKIP_REASON})._"
      else
        PREVIEW_SECTION="| Service | URL |
      |---------|-----|
      | Frontend | ${PREVIEW_FRONTEND} |
      | Backend API | ${PREVIEW_BACKEND} |
      | API Docs | ${PREVIEW_BACKEND}/docs |
      | PostgreSQL | \`localhost:1${PREVIEW_SLOT}54\` |
      | Redis | \`localhost:1${PREVIEW_SLOT}63\` |"
      fi

      gh issue comment "$ISSUE" --body "## Dark Factory Run â€” ${ACTION}

      ${PR_LINE}
      ${EPIC_LINE}
      **Branch:** \`${BRANCH}\`

      ### Changes

      ${CHANGES:-_No implementation summary available._}

      ${CONFORMANCE_SECTION}

      ### Preview Environment

      ${PREVIEW_SECTION}

      ### Commands
      \`\`\`bash
      # Iterate after review
      docker compose --profile factory run --rm dark-factory \"Continue issue #${ISSUE}\"

      # Tear down when done
      docker compose --profile factory run --rm dark-factory \"Close issue #${ISSUE}\"
      \`\`\`

      ---
      *Posted by MarketHawk Dark Factory*"

      echo "Report posted to issue #${ISSUE}"
    depends_on: [status-in-review]
    when: "$parse-intent.output.intent == 'new' || $parse-intent.output.intent == 'continue'"
    timeout: 15000
