repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
        files: '^backend/'
      - id: ruff-format
        files: '^backend/'

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: bash -c 'cd frontend && npx eslint . --report-unused-disable-directives-severity error'
        pass_filenames: false
        files: '\.(ts|tsx|js|jsx)$'

      - id: codeindex-blast
        name: codeindex blast-radius warning
        language: system
        entry: bash -c 'if command -v codeindex &>/dev/null; then codeindex impact "$@" 2>/dev/null && echo "[codeindex] blast-radius check complete" || true; fi; exit 0'
        pass_filenames: true
        stages: [pre-commit]
