repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
        files: '^backend/'
      - id: ruff-format
        files: '^backend/'

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: bash -c 'cd frontend && npm run lint'
        pass_filenames: false
        files: '\.(ts|tsx|js|jsx)$'
