name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: markethawk_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Validate Archon workflow YAML
        shell: python
        run: |
          import glob, sys, yaml
          errors = []
          for path in sorted(glob.glob('.archon/workflows/*.yaml')):
              try:
                  yaml.safe_load(open(path))
              except yaml.YAMLError as e:
                  errors.append(f'{path}: {e}')
          if errors:
              print('Archon workflow YAML validation failed:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          print(f'All {len(glob.glob(".archon/workflows/*.yaml"))} workflow file(s) valid.')

          # Semantic DAG check: OR-join nodes must declare a skip-tolerant trigger_rule.
          # Catches the class of regression introduced by ce9e4a3 (issue #224).
          sys.path.insert(0, 'dark-factory/scripts')
          from check_workflow_dag import check as dag_check
          dag_errors = dag_check('.archon/workflows/archon-dark-factory.yaml')
          if dag_errors:
              print('Archon workflow DAG validation failed:')
              for e in dag_errors:
                  print(f'  {e}')
              sys.exit(1)
          print('DAG trigger_rule check passed.')

      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt \
            --ignore-vuln PYSEC-2022-42969 \
            --ignore-vuln CVE-2026-30922

      - name: Run tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/markethawk_test
        run: python -m pytest

      - name: Run dark-factory tests
        run: python -m pytest dark-factory/tests/ -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Production build
        working-directory: frontend
        run: npm run build

      - name: Lint
        working-directory: frontend
        run: npx eslint . --report-unused-disable-directives-severity error

      - name: Dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high

  migration-check:
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: markethawk_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Apply migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/markethawk_test
          POLYGON_API_KEY: dummy-key-for-ci
          # >=32-char CI-only value so the JWT_SECRET_KEY startup validator (#190) passes
          # when alembic imports app.core.config. Not a real secret.
          JWT_SECRET_KEY: ci-test-only-not-secret-0123456789abcdef
        run: python -m alembic upgrade head

      - name: Check migration sync
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/markethawk_test
          POLYGON_API_KEY: dummy-key-for-ci
          JWT_SECRET_KEY: ci-test-only-not-secret-0123456789abcdef
        run: python -m alembic check
