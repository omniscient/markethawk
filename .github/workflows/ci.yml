name: CI

on:
  pull_request:
    branches: [main]

# Least-privilege default token for all jobs (F-CI-01). No job here writes;
# a compromised test/build step gets a read-only token.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: markethawk_test
        options: >-
          --health-cmd "pg_isready -U test -d markethawk_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Dependency audit
        run: |
          pip install pip-audit
          # Accepted advisories (all transitive via python-jose[cryptography]==3.4.0;
          # revisit when we migrate off python-jose — see backend/requirements.txt):
          #   PYSEC-2022-42969 / PYSEC-2026-1325 — ecdsa Minerva P-256 timing
          #     side-channels. No fix (maintainers declare side-channels out of
          #     scope); require local timing of signature *generation*. Not
          #     reachable: JWT signing uses server-held trusted keys via the
          #     cryptography backend, not an attacker-facing signing oracle.
          #   CVE-2026-30922 — pyasn1 0.4.8 ReDoS; fix (0.6.3) uninstallable
          #     (python-jose pins pyasn1<0.5.0). Also in .trivyignore.
          pip-audit -r backend/requirements.txt \
            --ignore-vuln PYSEC-2022-42969 \
            --ignore-vuln PYSEC-2026-1325 \
            --ignore-vuln CVE-2026-30922

      - name: Run tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/markethawk_test
        run: python -m pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-xml
          path: backend/coverage.xml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Production build
        working-directory: frontend
        run: npm run build

      - name: Lint
        working-directory: frontend
        run: npx eslint . --report-unused-disable-directives-severity error

      - name: Dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high

  migration-check:
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: markethawk_test
        options: >-
          --health-cmd "pg_isready -U test -d markethawk_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Apply migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/markethawk_test
          POLYGON_API_KEY: dummy-key-for-ci
          # >=32-char CI-only value so the JWT_SECRET_KEY startup validator (#190) passes
          # when alembic imports app.core.config. Not a real secret.
          JWT_SECRET_KEY: ci-test-only-not-secret-0123456789abcdef
          # >=16-char CI-only value so the REDIS_PASSWORD field_validator (#370) passes
          # when alembic imports app.core.config. Not a real secret.
          REDIS_PASSWORD: ci-redis-dummy-password-0123456789abcdef
        run: python -m alembic upgrade head

      - name: Check migration sync
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/markethawk_test
          POLYGON_API_KEY: dummy-key-for-ci
          JWT_SECRET_KEY: ci-test-only-not-secret-0123456789abcdef
          REDIS_PASSWORD: ci-redis-dummy-password-0123456789abcdef
        run: python -m alembic check

  adapter-validate:
    name: Factory adapter validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # dark-factory repo is public; clone provides factory_core.adapter + adapter_defaults
      # without requiring GHCR package-visibility grants (checkout variant, P2 Task 6).
      - name: Checkout dark-factory (public, factory_core.adapter loader)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: omniscient/dark-factory
          path: _dark-factory

      - name: Install factory_core dependencies
        run: pip install pyyaml aiohttp

      - name: Schema-validate .factory/adapter.yaml against the extracted factory
        run: |
          PYTHONPATH=_dark-factory/scripts python -m factory_core.adapter \
            --clone-dir "$GITHUB_WORKSPACE" --validate

      - name: Assert mirrored values equal factory defaults
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '_dark-factory/scripts')
          from factory_core import adapter, adapter_defaults
          merged = adapter.load('$GITHUB_WORKSPACE')
          for key in ('components', 'safety', 'memory_routing', 'deconflict'):
              assert merged[key] == adapter_defaults.DEFAULTS[key], f'MIRROR DRIFT in {key}'
          print('MIRROR-EQUAL')"

      - name: Hooks are executable and parse
        run: |
          for h in .factory/hooks/*; do
            [ -x "$h" ] || { echo "not executable: $h" >&2; exit 1; }
            bash -n "$h"
          done

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      # Advisory: surface MEDIUM+ findings in the log without failing the build.
      # The 5 known mediums (0.0.0.0 dev-runner bind, trusted-source pickle.loads,
      # reviewed migration seed SQL) are tracked for separate triage.
      - name: Bandit (advisory, medium+)
        continue-on-error: true
        run: bandit -r backend/app --severity-level medium --confidence-level all

      # Gate: fail CI on any HIGH-severity finding. CodeQL (codeql.yml) provides
      # the deeper analysis that feeds the Security tab.
      - name: Bandit gate (HIGH severity)
        run: bandit -r backend/app --severity-level high --confidence-level all
