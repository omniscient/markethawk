name: CI

on:
  pull_request:
    branches: [main]

# Least-privilege default token for all jobs (F-CI-01). No job here writes;
# a compromised test/build step gets a read-only token.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: markethawk_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Validate Archon workflow YAML
        shell: python
        run: |
          import glob, sys, yaml
          errors = []
          for path in sorted(glob.glob('.archon/workflows/*.yaml')):
              try:
                  yaml.safe_load(open(path))
              except yaml.YAMLError as e:
                  errors.append(f'{path}: {e}')
          if errors:
              print('Archon workflow YAML validation failed:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          print(f'All {len(glob.glob(".archon/workflows/*.yaml"))} workflow file(s) valid.')

          # Semantic DAG check: OR-join nodes must declare a skip-tolerant trigger_rule.
          # Catches the class of regression introduced by ce9e4a3 (issue #224).
          sys.path.insert(0, 'dark-factory/scripts')
          from check_workflow_dag import check as dag_check
          dag_errors = dag_check('.archon/workflows/archon-dark-factory.yaml')
          if dag_errors:
              print('Archon workflow DAG validation failed:')
              for e in dag_errors:
                  print(f'  {e}')
              sys.exit(1)
          print('DAG trigger_rule check passed.')

          # when: expression lint: reject parentheses and mixed &&/|| operators.
          # Catches the class of regression from PR #359 (issue #397/403).
          from check_workflow_when import check as when_check
          when_errors = []
          for path in sorted(glob.glob('.archon/workflows/*.yaml')):
              when_errors.extend(when_check(path))
          if when_errors:
              print('Archon workflow when: expression lint failed:')
              for e in when_errors:
                  print(f'  {e}')
              sys.exit(1)
          print('when: expression lint passed for all workflow file(s).')

      - name: Check preview credentials not leaked to non-preview compose files
        run: bash dark-factory/scripts/check_preview_creds.sh

      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt \
            --ignore-vuln PYSEC-2022-42969 \
            --ignore-vuln CVE-2026-30922

      - name: Run tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/markethawk_test
        run: python -m pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-xml
          path: backend/coverage.xml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Production build
        working-directory: frontend
        run: npm run build

      - name: Lint
        working-directory: frontend
        run: npx eslint . --report-unused-disable-directives-severity error

      - name: Dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high

  migration-check:
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: markethawk_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Apply migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/markethawk_test
          POLYGON_API_KEY: dummy-key-for-ci
          # >=32-char CI-only value so the JWT_SECRET_KEY startup validator (#190) passes
          # when alembic imports app.core.config. Not a real secret.
          JWT_SECRET_KEY: ci-test-only-not-secret-0123456789abcdef
          # >=16-char CI-only value so the REDIS_PASSWORD field_validator (#370) passes
          # when alembic imports app.core.config. Not a real secret.
          REDIS_PASSWORD: ci-redis-dummy-password-0123456789abcdef
        run: python -m alembic upgrade head

      - name: Check migration sync
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/markethawk_test
          POLYGON_API_KEY: dummy-key-for-ci
          JWT_SECRET_KEY: ci-test-only-not-secret-0123456789abcdef
          REDIS_PASSWORD: ci-redis-dummy-password-0123456789abcdef
        run: python -m alembic check

  factory-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install pytest pytest-mock pyyaml

      - name: Run factory_core tests
        run: python -m pytest dark-factory/tests/ -v
        env:
          PYTHONPATH: dark-factory/scripts

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      # Advisory: surface MEDIUM+ findings in the log without failing the build.
      # The 5 known mediums (0.0.0.0 dev-runner bind, trusted-source pickle.loads,
      # reviewed migration seed SQL) are tracked for separate triage.
      - name: Bandit (advisory, medium+)
        continue-on-error: true
        run: bandit -r backend/app --severity-level medium --confidence-level all

      # Gate: fail CI on any HIGH-severity finding. CodeQL (codeql.yml) provides
      # the deeper analysis that feeds the Security tab.
      - name: Bandit gate (HIGH severity)
        run: bandit -r backend/app --severity-level high --confidence-level all
