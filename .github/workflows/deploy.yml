name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. latest or sha-abc1234)'
        required: true
        default: latest
      run_migrations:
        description: 'Run database migrations after pulling images'
        required: false
        default: 'true'
        type: boolean

# Deploy runs over SSH and uses no GITHUB_TOKEN API scopes.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Validate the free-text image_tag before it can reach the remote shell.
      # The charset ^[a-z0-9._-]+$ excludes every shell metacharacter, so the value
      # cannot break out of the SSH script (command injection). Read via env (not
      # ${{ }}) so this gate step is itself injection-safe.
      - name: Validate image_tag input
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          case "$IMAGE_TAG" in
            '' ) echo "image_tag must not be empty" >&2; exit 1 ;;
            *[!a-z0-9._-]* ) echo "Invalid image_tag '$IMAGE_TAG' (allowed: ^[a-z0-9._-]+\$)" >&2; exit 1 ;;
          esac
          echo "image_tag '$IMAGE_TAG' is valid."

      - name: Deploy via SSH
        # Requires secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY
        # These are scaffolded here — add them in GitHub repository settings
        # once a deployment server is provisioned.
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          RUN_MIGRATIONS: ${{ inputs.run_migrations }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # Forward the validated inputs as remote env vars instead of interpolating
          # ${{ }} into the script — no untrusted text reaches the remote shell.
          envs: IMAGE_TAG,RUN_MIGRATIONS
          script: |
            set -e
            # IMAGE_TAG / RUN_MIGRATIONS arrive via envs above (image_tag validated
            # upstream). docker compose reads IMAGE_TAG from the environment.

            # Pull updated images for all deployed services
            docker compose pull \
              backend celery-worker celery-beat live-scanner flower frontend backlog-scheduler

            # Pull dark-factory image (profile-gated — updated via pull, not auto-restarted)
            docker compose --profile factory pull dark-factory

            # Run migrations before starting services so the backend never briefly serves
            # traffic against a stale schema. Uses run --rm (not exec) so this works even
            # when the backend is not yet running. Override the backend entrypoint here:
            # /entrypoint.sh runs `alembic check`, which correctly fails on a stale DB
            # and would otherwise prevent the upgrade command from reaching Alembic.
            # Postgres must be up (service_healthy).
            if [ "$RUN_MIGRATIONS" = "true" ]; then
              docker compose run --rm --entrypoint python backend -m alembic upgrade head
            fi

            # Restart services with updated images
            docker compose up -d \
              backend celery-worker celery-beat live-scanner flower frontend

            # Source DOMAIN from .env — docker-compose reads it automatically, but the
            # shell session does not; without this export ${DOMAIN:-} is always empty.
            if [ -f .env ]; then
              export $(grep -E '^DOMAIN=' .env || true)
            fi

            # Restart Caddy only when DOMAIN is set — fails loudly if DOMAIN is missing
            if [ -n "${DOMAIN:-}" ]; then
              docker compose --profile tls up -d caddy
            else
              echo "DOMAIN not set — skipping Caddy (TLS profile). Set DOMAIN in .env for HTTPS."
            fi

            # Restart backlog-scheduler if deployed with the scheduler profile
            docker compose --profile scheduler up -d backlog-scheduler
