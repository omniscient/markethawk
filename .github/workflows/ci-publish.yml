name: Build and Publish Images

on:
  push:
    branches: [main]
  workflow_dispatch: {}  # allow on-demand rebuild+push (e.g. to re-bake the vendored Archon clone)

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/omniscient/markethawk-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/omniscient/markethawk-frontend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-dark-factory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/omniscient/markethawk-dark-factory
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push dark-factory image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./dark-factory/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true  # force clean rebuild to exercise ubuntu-eviction layer (issue #261)

  scan:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-dark-factory]
    strategy:
      # Scan every image even if one trips the blocking gate — otherwise a
      # failure in one matrix leg cancels the others, leaving their Trivy SARIF
      # categories stale/missing in code scanning (and hiding which images are
      # actually affected).
      fail-fast: false
      matrix:
        include:
          # gate: "1" = block publish on HIGH/CRITICAL; "0" = advisory (scan +
          # SARIF only). The deployed, internet-facing app images block; the
          # dark-factory image is an internal CI tool whose HIGH/CRITICAL CVEs
          # are all in vendored upstream tooling (Archon deps, Docker/containerd
          # Go binaries, claude-code) — scanned + reported, not blocking. Tracked
          # for remediation in #531.
          - image: ghcr.io/omniscient/markethawk-backend
            sarif: backend-trivy.sarif
            gate: "1"
          - image: ghcr.io/omniscient/markethawk-frontend
            sarif: frontend-trivy.sarif
            gate: "1"
          - image: ghcr.io/omniscient/markethawk-dark-factory
            sarif: dark-factory-trivy.sarif
            gate: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan ${{ matrix.image }} for HIGH/CRITICAL CVEs (gate=${{ matrix.gate }})
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}:latest
          format: table
          exit-code: ${{ matrix.gate }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Scan ${{ matrix.image }} with Trivy (SARIF for Security tab)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: always()
        with:
          image-ref: ${{ matrix.image }}:latest
          format: sarif
          output: ${{ matrix.sarif }}
          exit-code: "0"
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF for ${{ matrix.image }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: ${{ matrix.sarif }}
          category: trivy-${{ matrix.image }}
