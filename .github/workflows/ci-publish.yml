name: Build and Publish Images

on:
  push:
    branches: [main]
  workflow_dispatch: {}  # allow on-demand rebuild+push (e.g. to re-bake the vendored Archon clone)

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/omniscient/markethawk-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/omniscient/markethawk-frontend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-dark-factory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/omniscient/markethawk-dark-factory
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push dark-factory image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dark-factory/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  scan:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-dark-factory]
    strategy:
      matrix:
        include:
          - image: ghcr.io/omniscient/markethawk-backend
            sarif: backend-trivy.sarif
          - image: ghcr.io/omniscient/markethawk-frontend
            sarif: frontend-trivy.sarif
          - image: ghcr.io/omniscient/markethawk-dark-factory
            sarif: dark-factory-trivy.sarif
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan ${{ matrix.image }} for HIGH/CRITICAL CVEs (blocking gate)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}:latest
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Scan ${{ matrix.image }} with Trivy (SARIF for Security tab)
        uses: aquasecurity/trivy-action@0.28.0
        if: always()
        with:
          image-ref: ${{ matrix.image }}:latest
          format: sarif
          output: ${{ matrix.sarif }}
          exit-code: "0"
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF for ${{ matrix.image }}
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ matrix.sarif }}
          category: trivy-${{ matrix.image }}
