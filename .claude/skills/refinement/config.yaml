# .claude/skills/refinement/config.yaml
scheduler:
  poll_interval: 60              # seconds between polls; env: POLL_INTERVAL overrides
  max_retries: 3                 # per-issue retry limit before trip_to_blocked; env: MAX_RETRIES overrides
  rate_limit_floor: 200          # pause polling when GraphQL remaining < this; env: RATE_LIMIT_FLOOR overrides
  factory_wip_limit: 1           # max concurrent factory containers; env: FACTORY_WIP_LIMIT overrides
  main_red_recheck_enabled: true # periodically recheck a red main to self-clear (#365); env: MAIN_RED_RECHECK_ENABLED overrides
  main_red_recheck_minutes: 20   # interval between red-main recheck dispatches; env: MAIN_RED_RECHECK_MINUTES overrides
  blocked_rescue_enabled: true   # promote a Blocked ticket whose PR is green+mergeable to In review instead of re-running it; env: BLOCKED_RESCUE_ENABLED overrides

refine:
  wip_limit: 2                   # env: REFINE_WIP_LIMIT overrides
  skip_labels:
    - needs-discussion
    - epic
    - spec-pending-review
  min_issue_body_length: 20

plan:
  skip_labels:
    - needs-discussion
    - epic
    - plan-pending-review

direct_to_pr:
  label: direct-to-pr          # env: DIRECT_TO_PR_LABEL overrides
  spec_grace_minutes: 30        # env: SPEC_GRACE_MINUTES overrides — 0 = advance on next poll
  plan_grace_minutes: 30        # env: PLAN_GRACE_MINUTES overrides — 0 = advance on next poll

conformance:
  enabled: true
  max_reconcile_cycles: 3
  block_on_material: true
  scope_enforcement: true    # detect & remediate out-of-scope changes at the conformance gate
  excise_out_of_scope: true  # revert out-of-scope changes from the branch (false = file backlog ticket only)
  backlog_label: scope-spillover  # label applied to auto-created spillover tickets

code_review:
  enabled: true
  block_threshold: high     # findings at this severity or above block (critical|high|medium|low)
  fail_open: true           # reviewer error / unparseable output → advisory, never block
  max_findings: 50          # cap inline comments to avoid spam (log if exceeded)
  severity_order:           # ascending rank — lowest to highest; sourced by code_review_payload.py
    - low
    - medium
    - high
    - critical

preview:
  enabled: true   # false = always build the preview (pre-differentiator behavior) — kill-switch
  model: haiku

conflict_resolution:
  enabled: true       # env: CONFLICT_RESOLUTION_ENABLED overrides — false = disable P1.5 conflict scanner
  ai_tier: true       # env: CONFLICT_RESOLUTION_AI_TIER overrides — false = only Tier 1 (mechanical) resolution

blast_radius:
  enabled: true
  hotspot_score_floor: 5.0      # files at or above this codeindex blast score trigger HUMAN_REQUIRED
  size_budget_lines: 400        # total added+deleted lines threshold (0 = disabled)
  size_budget_blocks: false     # true = size alone is blocking; false = advisory only

dispatch_ceiling:
  enabled: true                # env: DISPATCH_CEILING_ENABLED overrides — kill-switch
  label: above-ceiling         # env: ABOVE_CEILING_LABEL overrides
  keywords: "migration|migrate|performance|perf|architectur|refactor"  # env: ABOVE_CEILING_KEYWORDS overrides
  # L tickets (and M tickets with a keyword title match) park in Blocked for human pairing;
  # M tickets lose the plan-pending-review grace-window auto-advance. S is unaffected.
  # See docs/superpowers/specs/2026-06-12-size-type-aware-dispatch-ceiling-design.md
  # Revisit: 2026-09-12

epic_autopilot:
  enabled: false              # kill-switch — ship OFF. env: EPIC_AUTOPILOT_ENABLED overrides
  model: claude-opus-4-8      # reviewer model. env: EPIC_AUTOPILOT_MODEL overrides
  daily_cap: 5                # max autonomous advances / UTC day. env: EPIC_AUTOPILOT_DAILY_CAP overrides
  confidence_floor: 0.7       # min Opus confidence to ADVANCE. env: EPIC_AUTOPILOT_CONFIDENCE_FLOOR overrides
  hold_ttl_hours: 24          # re-review a cached HOLD after this many hours. env EPIC_AUTOPILOT_HOLD_TTL_HOURS
  size_ceiling: XL            # drop only at/above this size (L/M now eligible). env EPIC_AUTOPILOT_SIZE_CEILING
  start_epics: true           # when no gated child is advanceable, promote the next Ready epic. env EPIC_AUTOPILOT_START_EPICS
  sensitive_keywords: "trading|ibkr|live order|notional|authentication|authorization|authn|authz|jwt|oauth|rbac|/auth"
  opt_out_label: no-autopilot # per-ticket veto label. env: EPIC_AUTOPILOT_OPT_OUT_LABEL overrides
  hard_exclude_paths:         # spec target paths matching any of these → excluded before Opus (fail-closed)
    - "dark-factory/"
    - ".archon/"
    - "scheduler.sh"
    - "factory_core/"
    - "app/services/trading"
    - "app/tasks/trading.py"
    - "app/core/auth"
    - "app/routers/auth"
  # When starved (a poll dispatched nothing) and main is green, review the refined, below-ceiling
  # children of in-progress epics with Opus and advance the low-risk ones via direct-to-pr.
  # See docs/superpowers/specs/2026-06-20-epic-autopilot-design.md

main_red_autofix:
  # kill-switch — ships OFF. To ENABLE, set MAIN_RED_AUTOFIX_ENABLED=true in .archon/.env
  # (like EPIC_AUTOPILOT_ENABLED): the dispatched "Fix main" container reads .archon/.env, NOT this
  # file, so flipping `enabled` here alone does NOT turn the feature on. env MAIN_RED_AUTOFIX_ENABLED
  enabled: false
  model: claude-opus-4-8      # fix-agent model (container default; env MAIN_RED_AUTOFIX_MODEL)
  max_attempts: 3             # fix→CI cycles per red event (container default; env MAIN_RED_AUTOFIX_MAX_ATTEMPTS)
  throttle_minutes: 15        # min minutes between fixer dispatches (scheduler; env MAIN_RED_AUTOFIX_THROTTLE_MIN)
  ci_wait_minutes: 20         # bounded wait for branch CI (container default; env MAIN_RED_AUTOFIX_CI_WAIT_MINUTES)

token_optimization:
  enabled: true               # measure token usage per run; env: TOKEN_OPTIMIZATION_ENABLED overrides
  enforce_budgets: false      # false = measure-only (no enforcement); env: TOKEN_OPTIMIZATION_ENFORCE_BUDGETS overrides
  default_budget_tokens: 24000  # per-scenario budget when no override is set; env: TOKEN_OPTIMIZATION_DEFAULT_BUDGET_TOKENS overrides
  architecture:
    mode: slice               # slice = emit only the changed file excerpt + its direct callers
    max_tokens: 3000          # token ceiling for architecture context per scenario (baked — no env override)
  memory:
    mode: top_k               # top_k = emit only the K highest-scored memory entries
    max_entries: 8            # max memory entries surfaced per phase (baked — no env override)
    max_tokens: 1500          # token ceiling for memory context per phase (baked — no env override)
  comments:
    digest_after_factory_marker: true  # collapse comment blocks below the factory marker into a one-line digest
    max_tokens: 2000          # token ceiling for comment context per scenario (baked — no env override)
  diff:
    max_review_tokens: 6000   # token ceiling for diff context fed to the code-review sub-stage (baked — no env override)
  escalation:
    cheap_model_first: true   # route to haiku/sonnet before opus for non-sensitive scenarios; env: TOKEN_OPTIMIZATION_CHEAP_MODEL_FIRST overrides
    opus_only_for:            # scenario tags matched by factory command files (dark-factory-implement.md, etc.); always escalate to opus regardless of cheap_model_first
      - security
      - trading
      - auth
      - high_blast_radius
      - material_conformance_uncertainty
