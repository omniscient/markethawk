# .claude/skills/refinement/config.yaml
refine:
  wip_limit: 2
  skip_labels:
    - needs-discussion
    - epic
    - spec-pending-review
  min_issue_body_length: 20

plan:
  auto_advance_to_ready: false
  skip_labels:
    - needs-discussion
    - epic
    - plan-pending-review

conformance:
  enabled: true
  max_reconcile_cycles: 3
  block_on_material: true
